<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Carte Fidélité</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0ece4;font-family:'Helvetica Neue',sans-serif;min-height:100vh}
.app{max-width:460px;margin:0 auto;padding:24px 16px 80px}
.badge{background:rgba(200,149,108,.15);color:#c8956c;border:1px solid rgba(200,149,108,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;font-family:monospace}
.badge-argent{background:rgba(176,190,197,.15);color:#b0bec5;border-color:rgba(176,190,197,.3)}
.badge-or{background:rgba(249,208,86,.15);color:#f9d056;border-color:rgba(249,208,86,.3)}
.badge-platine{background:rgba(224,224,255,.15);color:#e0e0ff;border-color:rgba(224,224,255,.3)}
.tabs{display:flex;gap:4px;background:#111;border-radius:14px;padding:5px;margin-bottom:20px}
.tab{flex:1;padding:9px 4px;font-size:12px;background:transparent;border:1px solid transparent;color:#555;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{background:#1e1e1e;font-weight:700}
.section-title{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:10px}
.input{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;padding:13px 16px;color:#e0ddd8;font-size:14px;outline:none;width:100%;margin-bottom:12px}
.input::placeholder{color:#333}
.btn-primary{width:100%;background:#c8956c;color:#0a0a0a;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border-radius:30px;padding:12px 26px;font-size:14px;font-weight:600;box-shadow:0 8px 40px rgba(0,0,0,.6);z-index:999;white-space:nowrap;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.card-visual{background:linear-gradient(135deg,#1a1410 0%,#0d0d0d 100%);border-radius:24px;padding:24px 24px 20px;position:relative;overflow:hidden;margin-bottom:16px}
.progress-bar{height:4px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;margin:12px 0 6px}
.progress-fill{height:100%;border-radius:4px;transition:width 1s ease}
.gauge-row{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:12px 16px;margin-bottom:10px}
.gauge-bar{height:8px;background:#1a1a1a;border-radius:8px;overflow:hidden}
.gauge-fill{height:100%;border-radius:8px;transition:width .6s ease}
.qr-section{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:18px;margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.qr-div{border-radius:12px;background:#fff;padding:10px;display:flex;align-items:center;justify-content:center}
.tx-row{background:#111;border:1px solid #1c1c1c;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.tx-list{display:flex;flex-direction:column;gap:7px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = 'https://tgrqfrijwjonrehixgre.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Dk_GsamMzY1KRRIELRxngQ_xsH1Xxkr';
const SHOP_NAME    = "La craquante de lesigny";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LEVELS=[
  {name:"Bronze",  min:0,    max:499,      color:"#c8956c"},
  {name:"Argent",  min:500,  max:999,      color:"#b0bec5"},
  {name:"Or",      min:1000, max:1999,     color:"#f9d056"},
  {name:"Platine", min:2000, max:Infinity, color:"#e0e0ff"},
];
function getLevel(p){return LEVELS.find(l=>p>=l.min&&p<=l.max)||LEVELS[0]}
function getBadgeClass(pts){const n=getLevel(pts).name;return n==='Argent'?'badge badge-argent':n==='Or'?'badge badge-or':n==='Platine'?'badge badge-platine':'badge'}

let state={client:null,transactions:[],clientPoints:{},products:[],tab:'card',toast:null,loggedIn:false};

async function loadProducts(){const {data}=await sb.from('produits').select('*').eq('actif',true).order('ordre');state.products=data||[];}
async function loadClientPoints(id){const {data}=await sb.from('points_produits').select('*').eq('client_id',id);state.clientPoints={};(data||[]).forEach(r=>{state.clientPoints[r.produit_id]=r.points;});}
async function loadTransactions(id){const {data}=await sb.from('transactions').select('*').eq('client_id',id).order('created_at',{ascending:false}).limit(30);state.transactions=data||[];}

function generateQR(clientId){
  setTimeout(()=>{
    const div=document.getElementById('qr-div-'+clientId);
    if(!div||div.querySelector('canvas'))return;
    new QRCode(div,{text:'FL-'+clientId,width:180,height:180,colorDark:'#000000',colorLight:'#ffffff'});
  },100);
}

function render(){
  document.getElementById('root').innerHTML=`
    ${state.toast?`<div class="toast" style="border:1px solid ${state.toast.color}77;color:${state.toast.color}">${state.toast.msg}</div>`:''}
    ${!state.loggedIn?renderLogin():renderCard()}`;
  if(state.loggedIn&&state.tab==='card'&&state.client)generateQR(state.client.id);
}

function renderLogin(){return`
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:24px">
    <div style="text-align:center">
      <div style="font-size:10px;letter-spacing:4px;color:#333;text-transform:uppercase;margin-bottom:4px">programme fidélité</div>
      <div style="font-size:24px;letter-spacing:1px;color:#e8e2d8">${SHOP_NAME}</div>
    </div>
    <div style="background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:28px 24px;width:100%;max-width:380px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:40px;margin-bottom:8px">🎴</div>
        <div style="font-size:18px;font-weight:700;color:#e8e2d8">Ma Carte Fidélité</div>
        <div style="font-size:12px;color:#555;margin-top:6px">Connectez-vous pour accéder à vos points</div>
      </div>
      <input class="input" type="tel" id="tel-input" placeholder="Votre numéro de téléphone" onkeydown="if(event.key==='Enter')loginClient()">
      <input class="input" type="password" id="pin-input" placeholder="Votre code PIN à 4 chiffres" maxlength="4" onkeydown="if(event.key==='Enter')loginClient()">
      <button onclick="loginClient()" class="btn-primary">Accéder à ma carte</button>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:#444;line-height:1.7">
        Pas encore de compte ?<br>
        <span style="color:#c8956c">Demandez à votre caissier de vous inscrire</span>
      </div>
    </div>
    <div style="font-size:11px;color:#2a2a2a;text-align:center;max-width:280px">
      💡 Ajoutez cette page à vos favoris pour y accéder rapidement
    </div>
  </div>`;}

async function loginClient(){
  const tel=document.getElementById('tel-input').value.trim();
  const pin=document.getElementById('pin-input').value.trim();
  if(!tel||!pin)return showToast('Entrez votre numéro et PIN','#e87070');
  const {data}=await sb.from('clients').select('*').eq('telephone',tel).eq('pin',pin).single();
  if(data){
    state.client=data;state.loggedIn=true;
    await Promise.all([loadProducts(),loadClientPoints(data.id),loadTransactions(data.id)]);
    render();
  } else showToast('Numéro ou PIN incorrect','#e87070');
}

function logout(){
  Object.assign(state,{client:null,loggedIn:false,transactions:[],clientPoints:{},products:[],tab:'card'});
  render();
}

function renderCard(){
  const c=state.client;
  const level=getLevel(c.points);
  const nextLevel=LEVELS[LEVELS.indexOf(level)+1];
  return`
    <div class="app">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:10px;letter-spacing:4px;color:#333;text-transform:uppercase;margin-bottom:4px">programme fidélité</div>
        <div style="font-size:22px;letter-spacing:1px;color:#e8e2d8">${SHOP_NAME}</div>
      </div>
      <div style="background:#111;border:1px solid rgba(200,149,108,.15);border-radius:12px;padding:10px 14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:8px;align-items:center">
          <span class="${getBadgeClass(c.points)}">${level.name}</span>
          <span style="font-size:13px;color:#777">${c.nom}</span>
        </div>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:15px;font-weight:700;color:#c8956c;font-family:monospace">${c.points} pts</span>
          <button onclick="logout()" style="background:none;border:none;color:#444;font-size:11px;cursor:pointer">⏏️</button>
        </div>
      </div>
      <div class="tabs">
        ${[{id:'card',l:'🎴 Carte'},{id:'jauges',l:'📊 Points'},{id:'history',l:'📋 Historique'}].map(t=>
          `<button class="tab ${state.tab===t.id?'active':''}" style="${state.tab===t.id?`color:${level.color};border-color:${level.color}44`:''}" onclick="state.tab='${t.id}';render()">${t.l}</button>`
        ).join('')}
      </div>
      ${state.tab==='card'?renderCardTab(c,level,nextLevel):''}
      ${state.tab==='jauges'?renderJaugesTab():''}
      ${state.tab==='history'?renderHistoryTab():''}
    </div>`;
}

function renderCardTab(c,level,nextLevel){
  const prog=nextLevel?Math.min(100,((c.points-level.min)/(nextLevel.min-level.min))*100):100;
  return`
    <div class="card-visual" style="box-shadow:0 0 0 1px ${level.color}33,0 20px 50px rgba(0,0,0,.6)">
      <div style="position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,${level.color}18 0%,transparent 70%);pointer-events:none"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div>
          <div style="font-size:9px;letter-spacing:3px;color:${level.color};text-transform:uppercase;margin-bottom:3px">Carte Fidélité</div>
          <div style="font-size:16px;font-weight:700;font-family:Georgia,serif;color:#e8e2d8">${SHOP_NAME}</div>
        </div>
        <span class="${getBadgeClass(c.points)}">${level.name}</span>
      </div>
      <div style="font-size:48px;font-weight:800;color:${level.color};letter-spacing:-3px;line-height:1;text-align:center;margin-bottom:4px">${c.points.toLocaleString()}</div>
      <div style="font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;text-align:center">points globaux</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:linear-gradient(90deg,${level.color}66,${level.color})"></div></div>
      ${nextLevel?`<div style="font-size:11px;color:#444;text-align:right;margin-bottom:14px">${nextLevel.min-c.points} pts avant ${nextLevel.name}</div>`:'<div style="margin-bottom:14px"></div>'}
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:9px;color:#3a3a3a;letter-spacing:2px;text-transform:uppercase">Titulaire</div>
          <div style="font-size:14px;letter-spacing:1px;margin-top:2px;color:#ccc">${c.nom}</div>
        </div>
        <div style="font-family:monospace;font-size:10px;color:#2a2a2a">${c.telephone}</div>
      </div>
    </div>
    <div class="qr-section">
      <div class="section-title">Mon QR code caisse</div>
      <div id="qr-div-${c.id}" class="qr-div"></div>
      <div style="font-size:12px;color:#555;text-align:center;line-height:1.6">Montrez ce QR code au caissier<br>pour être identifié instantanément</div>
      <button onclick="printQR()" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#c8956c;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer">🖨️ Imprimer ma carte</button>
    </div>`;
}

function renderJaugesTab(){
  if(!state.products.length)return`<div style="text-align:center;color:#333;padding:24px">Chargement...</div>`;
  return`
    <div class="section-title">Mes points par produit</div>
    ${state.products.map(p=>{
      const val=state.clientPoints[p.id]||0;
      const prog=(val/p.seuil)*100;
      const restant=p.seuil-val;
      return`<div class="gauge-row">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">${p.icon}</span><span style="font-size:14px;color:#ddd;font-weight:500">${p.nom}</span></div>
          <div style="font-size:15px;font-weight:700;color:#c8956c;font-family:monospace">${val}/${p.seuil}</div>
        </div>
        <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(100,prog)}%;background:${prog>=80?'#7ec87e':prog>=50?'#f9d056':'#c8956c'}"></div></div>
        <div style="font-size:11px;color:#444;margin-top:5px">${restant===0?'🎉 Récompense disponible ! Parlez-en au caissier':restant+' achat'+(restant>1?'s':'')+' avant 1 '+p.nom+' offert'}</div>
      </div>`;
    }).join('')}
    <div style="background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:12px 16px;margin-top:4px;font-size:12px;color:#444;line-height:1.7">
      💬 Montrez votre QR code au caissier pour faire valoir vos récompenses.
    </div>`;
}

function renderHistoryTab(){return`
  <div class="section-title">30 dernières transactions</div>
  <div class="tx-list">
    ${state.transactions.length===0?`<div style="text-align:center;color:#252525;font-size:13px;padding:24px">Aucune transaction</div>`:''}
    ${state.transactions.map(tx=>`
      <div class="tx-row">
        <div><div style="font-size:13px;color:#ddd;margin-bottom:2px">${tx.label}</div><div style="font-size:11px;color:#444">${new Date(tx.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</div></div>
        <div style="font-family:monospace;font-weight:700;font-size:13px;color:${tx.type==='redeem'?'#e87070':tx.type==='bonus'?'#f9d056':'#7ec87e'}">${tx.points>0?'+':''}${tx.points} pt${Math.abs(tx.points)>1?'s':''}</div>
      </div>`).join('')}
  </div>`;}

function printQR(){
  const div=document.getElementById('qr-div-'+state.client.id);
  const canvas=div?.querySelector('canvas');
  if(!canvas)return;
  const win=window.open('','_blank');
  win.document.write(`<html><head><title>Carte — ${state.client.nom}</title>
    <style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif}
    .card{border:2px solid #c8956c;border-radius:16px;padding:24px;text-align:center;width:280px}</style></head>
    <body><div class="card">
    <div style="font-size:16px;font-weight:bold;color:#1a1410;margin-bottom:4px">${SHOP_NAME}</div>
    <div style="font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">Carte Fidélité</div>
    <img src="${canvas.toDataURL()}" width="160" height="160">
    <div style="font-size:16px;font-weight:bold;margin-top:12px">${state.client.nom}</div>
    <div style="font-size:11px;color:#aaa;margin-top:6px">Présentez ce QR code en caisse</div>
    </div></body></html>`);
  win.document.close();win.print();
}

function showToast(msg,color='#8fc98a'){
  state.toast={msg,color};render();
  setTimeout(()=>{state.toast=null;render();},3000);
}
render();
</script>
</body>
</html>
