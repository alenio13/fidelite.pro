<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Carte Fidélité</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1e1e2e;color:#f5f2ee;font-family:'Helvetica Neue',sans-serif;min-height:100vh}
.app{max-width:460px;margin:0 auto;padding:24px 16px 80px}
.badge{background:rgba(200,149,108,.25);color:#e8a87c;border:1px solid rgba(200,149,108,.4);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;font-family:monospace}
.badge-argent{background:rgba(176,190,197,.25);color:#c8d8e0;border-color:rgba(176,190,197,.4)}
.badge-or{background:rgba(249,208,86,.25);color:#f9d056;border-color:rgba(249,208,86,.4)}
.badge-platine{background:rgba(224,224,255,.25);color:#e0e0ff;border-color:rgba(224,224,255,.4)}
.badge-vip{background:rgba(255,215,0,.25);color:#ffd700;border:1px solid rgba(255,215,0,.5);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.tabs{display:flex;gap:4px;background:#2a2a3e;border-radius:14px;padding:5px;margin-bottom:20px}
.tab{flex:1;padding:9px 4px;font-size:11px;background:transparent;border:1px solid transparent;color:#aaa;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{background:#3a3a52;font-weight:700;color:#f5f2ee}
.section-title{font-size:10px;letter-spacing:3px;color:#aaa;text-transform:uppercase;margin-bottom:10px}
.input{background:#2a2a3e;border:1px solid #4a4a60;border-radius:12px;padding:13px 16px;color:#f5f2ee;font-size:14px;outline:none;width:100%;margin-bottom:12px}
.input::placeholder{color:#666}
.btn-primary{width:100%;background:#c8956c;color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#2a2a3e;border-radius:30px;padding:12px 26px;font-size:14px;font-weight:600;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:999;white-space:nowrap;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.card-visual{background:linear-gradient(135deg,#2a1e14 0%,#1e1e2e 100%);border-radius:24px;padding:24px 24px 20px;position:relative;overflow:hidden;margin-bottom:16px}
.progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin:12px 0 6px}
.progress-fill{height:100%;border-radius:4px;transition:width 1s ease}
.gauge-bar{height:8px;background:#2a2a3e;border-radius:8px;overflow:hidden}
.gauge-fill{height:100%;border-radius:8px;transition:width .6s ease}
.gauge-row{background:#2a2a3e;border:1px solid #3a3a50;border-radius:12px;padding:12px 16px;margin-bottom:10px}
.tx-row{background:#2a2a3e;border:1px solid #3a3a50;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.tx-list{display:flex;flex-direction:column;gap:7px}
.qr-section{background:#2a2a3e;border:1px solid #3a3a50;border-radius:16px;padding:18px;margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.qr-div{border-radius:12px;background:#fff;padding:10px;display:flex;align-items:center;justify-content:center}
.vip-banner{background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,165,0,.1));border:1px solid rgba(255,215,0,.4);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
/* === 3D ANIMATED CARD === */
.card-3d-stage{perspective:1500px;height:240px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.card-3d-client{width:100%;max-width:340px;aspect-ratio:1.6;position:relative;transform-style:preserve-3d;cursor:pointer;transition:transform .8s cubic-bezier(.4,.2,.2,1);animation:cardFloatC 6s ease-in-out infinite}
.card-3d-client.flipped{transform:rotateY(180deg);animation:none}
@keyframes cardFloatC{0%,100%{transform:translateY(0) rotateX(4deg) rotateY(-4deg)}50%{transform:translateY(-6px) rotateX(4deg) rotateY(-2deg)}}
.card-face-c{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.6)}
.card-front-c{padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between;color:#f5f2ee}
.card-back-c{transform:rotateY(180deg);padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.card-shine-c{position:absolute;inset:0;background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.08) 50%,transparent 65%);animation:shineC 5s ease-in-out infinite;pointer-events:none}
@keyframes shineC{0%,100%{transform:translateX(-30%)}50%{transform:translateX(30%)}}
.card-flip-hint-c{text-align:center;font-size:10px;color:#666;letter-spacing:2px;text-transform:uppercase;margin:4px 0 14px;animation:hintBlinkC 2.4s infinite}
@keyframes hintBlinkC{0%,100%{opacity:.4}50%{opacity:1}}
.card-magstripe{position:absolute;top:18px;left:0;right:0;height:30px;background:#0a0a14}
.qr-on-card{width:130px;height:130px;background:#fff;border-radius:8px;padding:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.qr-on-card canvas{width:100% !important;height:100% !important;image-rendering:pixelated;image-rendering:crisp-edges;display:block}
.card-chip{width:32px;height:24px;background:linear-gradient(135deg,#d4af37,#b8860b);border-radius:4px;position:relative}
.card-chip::before{content:'';position:absolute;inset:3px;border-radius:2px;background:repeating-linear-gradient(0deg,rgba(0,0,0,.2),rgba(0,0,0,.2) 1px,transparent 1px,transparent 4px),repeating-linear-gradient(90deg,rgba(0,0,0,.2),rgba(0,0,0,.2) 1px,transparent 1px,transparent 4px)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = 'https://tgrqfrijwjonrehixgre.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Dk_GsamMzY1KRRIELRxngQ_xsH1Xxkr';
const SHOP_NAME    = "La craquante de lesigny";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LEVELS=[
  {name:"Bronze",  min:0,    max:499,      color:"#c8956c"},
  {name:"Argent",  min:500,  max:999,      color:"#b0bec5"},
  {name:"Or",      min:1000, max:1999,     color:"#f9d056"},
  {name:"Platine", min:2000, max:Infinity, color:"#e0e0ff"},
];
const LEVEL_ORDER=["Bronze","Argent","Or","Platine"];

function getLevel(p){return LEVELS.find(l=>p>=l.min&&p<=l.max)||LEVELS[0];}
function getBadgeClass(pts){
  const n=getLevel(pts).name;
  return n==='Argent'?'badge badge-argent':n==='Or'?'badge badge-or':n==='Platine'?'badge badge-platine':'badge';
}
function today(){return new Date().toISOString().split('T')[0];}
function oneYearAgo(){const d=new Date();d.setFullYear(d.getFullYear()-1);return d.toISOString().split('T')[0];}

let state={
  client:null, transactions:[], clientPoints:{}, products:[],
  recompensesNiveaux:[], recompenseVip:null,
  tab:'card', toast:null, loggedIn:false,
};

async function loadProducts(){
  const {data}=await sb.from('produits').select('*').eq('actif',true).order('ordre');
  state.products=data||[];
}
async function loadClientPoints(id){
  const {data}=await sb.from('points_produits').select('*').eq('client_id',id);
  state.clientPoints={};
  (data||[]).forEach(r=>{state.clientPoints[r.produit_id]=r.points;});
}
async function loadTransactions(id){
  const {data}=await sb.from('transactions').select('*').eq('client_id',id).order('created_at',{ascending:false}).limit(50);
  state.transactions=data||[];
}
async function loadRecompenses(){
  const [{data:rn},{data:rv}]=await Promise.all([
    sb.from('recompenses_niveaux').select('*').eq('actif',true),
    sb.from('recompense_vip').select('*').eq('actif',true).limit(1),
  ]);
  state.recompensesNiveaux=rn||[];
  state.recompenseVip=(rv&&rv[0])||null;
}

function generateQR(clientId){
  setTimeout(function(){
    const div=document.getElementById('qr-div-'+clientId);
    if(!div||div.querySelector('canvas'))return;
    new QRCode(div,{text:'FL-'+clientId,width:180,height:180,colorDark:'#000000',colorLight:'#ffffff'});
  },100);
}

function render(){
  const root=document.getElementById('root');
  let html='';
  if(state.toast){
    html+='<div class="toast" style="border:1px solid '+state.toast.color+'77;color:'+state.toast.color+'">'+state.toast.msg+'</div>';
  }
  if(!state.loggedIn){
    html+=renderLogin();
  } else {
    html+=renderCard();
  }
  root.innerHTML=html;
  if(state.loggedIn&&state.tab==='card'&&state.client){
    generateQR(state.client.id);
  }
}

function renderLogin(){
  return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:24px">'+
    '<div style="text-align:center">'+
    '<div style="font-size:10px;letter-spacing:4px;color:#aaa;text-transform:uppercase;margin-bottom:4px">programme fidélité</div>'+
    '<div style="font-size:24px;letter-spacing:1px;color:#f5f2ee">'+SHOP_NAME+'</div></div>'+
    '<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:20px;padding:28px 24px;width:100%;max-width:380px">'+
    '<div style="text-align:center;margin-bottom:20px">'+
    '<div style="font-size:40px;margin-bottom:8px">🎴</div>'+
    '<div style="font-size:18px;font-weight:700;color:#f5f2ee">Ma Carte Fidélité</div>'+
    '<div style="margin-top:6px;font-size:11px;color:#888">Propulsé par <span style="color:#c8956c;font-weight:600;letter-spacing:1px">FidelioPro</span></div>'+
    '<div style="font-size:12px;color:#888;margin-top:6px">Connectez-vous ou créez votre compte</div></div>'+
    // Connexion
    '<div id="form-login">'+
    '<input class="input" type="tel" id="tel-input" placeholder="Votre numéro de téléphone">'+
    '<input class="input" type="password" id="pin-input" placeholder="Votre code PIN à 4 chiffres" maxlength="4">'+
    '<button onclick="loginClient()" class="btn-primary">Accéder à ma carte</button>'+
    '<div style="text-align:center;margin-top:14px">'+
    '<button onclick="showFormInscription()" style="background:none;border:none;color:#e8a87c;font-size:13px;cursor:pointer">Première visite ? Créer mon compte →</button>'+
    '</div></div>'+
    // Inscription
    '<div id="form-inscription" style="display:none">'+
    '<div style="font-size:14px;color:#f5f2ee;font-weight:700;margin-bottom:14px;text-align:center">Créer mon compte</div>'+
    '<input class="input" type="tel" id="tel-inscription" placeholder="Votre numéro de téléphone">'+
    '<input class="input" type="password" id="pin-nouveau" placeholder="Choisissez un code PIN à 4 chiffres" maxlength="4">'+
    '<input class="input" type="password" id="pin-confirm" placeholder="Confirmez votre code PIN" maxlength="4">'+
    '<button onclick="creerCompteClient()" class="btn-primary">Créer mon compte</button>'+
    '<div style="text-align:center;margin-top:14px">'+
    '<button onclick="showFormLogin()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer">← Retour connexion</button>'+
    '</div></div>'+
    '</div>'+
    '<div style="font-size:11px;color:#444;text-align:center;max-width:280px">'+
   '💡 Ajoutez cette page à vos favoris pour y accéder rapidement</div></div>'+
'<div style="text-align:center;margin-top:16px;font-size:11px;color:#888">Propulsé par <span style="color:#c8956c;font-weight:600;letter-spacing:1px">FidelioPro</span></div>';
}

function showFormInscription(){
  document.getElementById('form-login').style.display='none';
  document.getElementById('form-inscription').style.display='block';
}
function showFormLogin(){
  document.getElementById('form-login').style.display='block';
  document.getElementById('form-inscription').style.display='none';
}

async function creerCompteClient(){
  const tel=document.getElementById('tel-inscription')?.value?.trim();
  const pin=document.getElementById('pin-nouveau')?.value?.trim();
  const confirm=document.getElementById('pin-confirm')?.value?.trim();
  if(!tel)return showToast('Entrez votre numéro de téléphone','#e87070');
  if(!pin||pin.length!==4)return showToast('Le PIN doit faire 4 chiffres','#e87070');
  if(pin!==confirm)return showToast('Les PIN ne correspondent pas','#e87070');
  // Vérifier si le numéro existe (compte créé par caissière sans PIN)
  const {data:existing}=await sb.from('clients').select('*').eq('telephone',tel).single();
  if(existing&&existing.pin){
    return showToast('Ce numéro a déjà un compte — connectez-vous','#e87070');
  }
  if(existing&&!existing.pin){
    // Compte existe sans PIN — le client définit son PIN
    await sb.from('clients').update({pin}).eq('id',existing.id);
    state.client={...existing,pin};
    state.loggedIn=true;
    await Promise.all([loadProducts(),loadClientPoints(existing.id),loadTransactions(existing.id),loadRecompenses()]);
    showToast('✅ Compte activé ! Bienvenue '+existing.nom+' !','#8fc98a');
    render();
  } else {
    return showToast('Numéro non reconnu — demandez à votre caissier de vous inscrire','#e87070');
  }
}

async function loginClient(){
  const tel=document.getElementById('tel-input').value.trim();
  const pin=document.getElementById('pin-input').value.trim();
  if(!tel||!pin)return showToast('Entrez votre numéro et PIN','#e87070');
  const {data}=await sb.from('clients').select('*').eq('telephone',tel).eq('pin',pin).single();
  if(data){
    state.client=data;
    state.loggedIn=true;
    await Promise.all([loadProducts(),loadClientPoints(data.id),loadTransactions(data.id),loadRecompenses()]);
    render();
  } else {
    showToast('Numéro ou PIN incorrect','#e87070');
  }
}

function logout(){
  state.client=null;
  state.loggedIn=false;
  state.transactions=[];
  state.clientPoints={};
  state.products=[];
  state.recompensesNiveaux=[];
  state.recompenseVip=null;
  state.tab='card';
  render();
}

function renderCard(){
  const c=state.client;
  const level=getLevel(c.points);
  const nextLevel=LEVELS[LEVELS.indexOf(level)+1];
  const isVip=c.vip;

  let html='<div class="app">';

  // Header
  html+='<div style="text-align:center;margin-bottom:20px">'+
    '<div style="font-size:10px;letter-spacing:4px;color:#aaa;text-transform:uppercase;margin-bottom:4px">programme fidélité</div>'+
    '<div style="font-size:22px;letter-spacing:1px;color:#f5f2ee">'+SHOP_NAME+'</div></div>';

  // Barre client
  html+='<div style="background:#2a2a3e;border:1px solid rgba(200,149,108,.2);border-radius:12px;padding:10px 14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">'+
    '<div style="display:flex;gap:8px;align-items:center">'+
    '<span class="'+getBadgeClass(c.points)+'">'+level.name+'</span>'+
    (isVip?'<span class="badge-vip">★ VIP +'+c.vip_bonus+'%</span>':'')+
    '<span style="font-size:13px;color:#aaa">'+c.nom+'</span></div>'+
    '<div style="display:flex;gap:12px;align-items:center">'+
    '<span style="font-size:15px;font-weight:700;color:#e8a87c;font-family:monospace">'+c.points+' pts</span>'+
    '<button onclick="logout()" style="background:none;border:none;color:#666;font-size:11px;cursor:pointer">⏏️</button></div></div>';

  // Onglets
  html+='<div class="tabs">';
  var tabs=[{id:'card',l:'🎴 Carte'},{id:'jauges',l:'📊 Points'},{id:'niveaux',l:'🏆 Niveaux'},{id:'history',l:'📋 Historique'}];
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    html+='<button class="tab '+(state.tab===t.id?'active':'')+'" '+
      'style="'+(state.tab===t.id?'color:'+level.color+';border-color:'+level.color+'44':'')+'" '+
      'onclick="state.tab=\''+t.id+'\';render()">'+t.l+'</button>';
  }
  html+='</div>';

  if(state.tab==='card') html+=renderCardTab(c,level,nextLevel,isVip);
  if(state.tab==='jauges') html+=renderJaugesTab();
  if(state.tab==='niveaux') html+=renderNiveauxTab(c,isVip);
  if(state.tab==='history') html+=renderHistoryTab();

  html+='</div>';
  return html;
}

function renderCardTab(c,level,nextLevel,isVip){
  const prog=nextLevel?Math.min(100,((c.points-level.min)/(nextLevel.min-level.min))*100):100;
  const cutoff=oneYearAgo();
  var expiringSoon=(state.transactions||[]).filter(function(t){
    if(!t.created_at||t.points<=0||t.type!=='earn')return false;
    var d=t.created_at.split('T')[0];
    var limit=new Date(d);limit.setFullYear(limit.getFullYear()+1);
    var daysLeft=Math.ceil((limit-new Date())/(1000*60*60*24));
    return daysLeft>0&&daysLeft<=30;
  });
  var ptsExpiring=expiringSoon.reduce(function(s,t){return s+t.points;},0);

  let html='';

  // Bannière VIP
  if(isVip){
    html+='<div class="vip-banner">'+
      '<span style="font-size:24px">★</span>'+
      '<div><div style="font-size:14px;color:#ffd700;font-weight:700">Client VIP — Bonus +'+c.vip_bonus+'%</div>'+
      '<div style="font-size:12px;color:#a8900a;margin-top:2px">Bonus automatique sur tous vos points</div></div></div>';
  }

  // Récompense mensuelle VIP
  if(isVip&&state.recompenseVip){
    var dejaRecup=c.recompense_mensuelle_recup&&c.recompense_mensuelle_recup.slice(0,7)===new Date().toISOString().slice(0,7);
    if(!dejaRecup){
      html+='<div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:12px;padding:12px 16px;margin-bottom:16px">'+
        '<div style="font-size:13px;color:#ffd700;font-weight:700;margin-bottom:4px">★ Récompense mensuelle disponible !</div>'+
        '<div style="font-size:12px;color:#a8900a">'+state.recompenseVip.description+' — Demandez au caissier</div></div>';
    }
  }

  // Alerte expiration
  if(ptsExpiring>0){
    html+='<div style="background:rgba(232,112,112,.1);border:1px solid rgba(232,112,112,.3);border-radius:12px;padding:12px 16px;margin-bottom:16px">'+
      '<div style="font-size:13px;color:#e87070;font-weight:600;margin-bottom:4px">⚠️ '+ptsExpiring+' pts expirent bientôt !</div>'+
      '<div style="font-size:12px;color:#888">Ces points expirent dans moins de 30 jours.<br>Revenez nous voir pour les utiliser !</div></div>';
  }

  // Carte 3D animée (recto = infos, verso = QR code)
  var accentColor=isVip?'#ffd700':level.color;
  var accentRgba=isVip?'rgba(255,215,0,.35)':level.color+'55';
  var bgFront=isVip?'linear-gradient(135deg,#3a2e14 0%,#2a1e14 50%,#1e1e2e 100%)':'linear-gradient(135deg,#2a1e14 0%,#1e1e2e 100%)';
  var bgBack='linear-gradient(135deg,#1e1e2e 0%,#2a1e14 100%)';
  html+='<div class="card-3d-stage">'+
    '<div class="card-3d-client" onclick="this.classList.toggle(\'flipped\')">'+
      // RECTO
      '<div class="card-face-c card-front-c" style="background:'+bgFront+';box-shadow:0 0 0 1px '+accentRgba+',0 20px 50px rgba(0,0,0,.6)">'+
        '<div class="card-shine-c"></div>'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2">'+
          '<div>'+
            '<div style="font-size:9px;letter-spacing:3px;color:'+accentColor+';text-transform:uppercase;margin-bottom:3px">Carte Fidélité'+(isVip?' ★ VIP':'')+'</div>'+
            '<div style="font-size:15px;font-weight:700;font-family:Georgia,serif;color:#f5f2ee">'+SHOP_NAME+'</div>'+
          '</div>'+
          '<span class="'+getBadgeClass(c.points)+'">'+level.name+'</span>'+
        '</div>'+
        '<div style="position:relative;z-index:2"><div class="card-chip"></div></div>'+
        '<div style="position:relative;z-index:2">'+
          '<div style="font-size:34px;font-weight:800;color:'+accentColor+';letter-spacing:-1px;line-height:1;font-family:monospace">'+c.points.toLocaleString()+' <span style="font-size:14px;letter-spacing:2px">PTS</span></div>'+
          '<div class="progress-bar"><div class="progress-fill" style="width:'+prog+'%;background:linear-gradient(90deg,'+(isVip?'rgba(255,215,0,.6),#ffd700':level.color+'66,'+level.color)+')"></div></div>'+
          '<div style="display:flex;justify-content:space-between;align-items:end;font-size:10px;color:#888;margin-top:4px">'+
            '<div>'+
              '<div style="font-size:8px;color:#555;letter-spacing:2px;text-transform:uppercase">Titulaire</div>'+
              '<div style="font-size:12px;letter-spacing:1px;margin-top:2px;color:#ccc;text-transform:uppercase">'+c.nom+'</div>'+
            '</div>'+
            '<div style="text-align:right">'+
              (nextLevel?'<div style="font-size:9px;color:#666">'+(nextLevel.min-c.points)+' pts → '+nextLevel.name+'</div>':'<div style="font-size:9px;color:'+accentColor+'">★ Niveau max</div>')+
              '<div style="font-family:monospace;font-size:9px;color:#444;margin-top:2px">'+c.telephone+'</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      // VERSO
      '<div class="card-face-c card-back-c" style="background:'+bgBack+';box-shadow:0 0 0 1px '+accentRgba+',0 20px 50px rgba(0,0,0,.6)">'+
        '<div id="qr-div-'+c.id+'" class="qr-on-card"></div>'+
        '<div style="font-size:9px;color:'+accentColor+';letter-spacing:3px;text-transform:uppercase;text-align:center;font-weight:600">✦ Scan en caisse ✦</div>'+
        '<div style="font-size:10px;color:#666;text-align:center;letter-spacing:.5px">Présentez ce QR au caissier</div>'+
      '</div>'+
    '</div>'+
  '</div>';
  html+='<div class="card-flip-hint-c">↻ Cliquer la carte pour afficher le QR</div>';

  // Bouton imprimer
  html+='<div style="text-align:center;margin-bottom:14px">'+
    '<button onclick="printQR()" style="background:#2a2a3e;border:1px solid #3a3a50;color:#e8a87c;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer">🖨️ Imprimer ma carte</button>'+
  '</div>';

  // Bloc email
  html+='<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:14px;padding:14px 16px;margin-top:14px">'+
'<div class="section-title">Mon email</div>'+
(c.email?
  '<div style="display:flex;align-items:center;gap:8px">'+
  '<span style="font-size:18px">✅</span>'+
  '<div><div style="font-size:13px;color:#7ec87e;font-weight:600">'+c.email+'</div>'+
  '<div style="font-size:11px;color:#666;margin-top:2px">Email enregistré — vous recevrez les offres exclusives</div></div></div>'
:
  '<div style="font-size:12px;color:#888;margin-bottom:10px">Renseignez votre email pour recevoir les offres exclusives !</div>'+
  '<div style="display:flex;gap:8px">'+
  '<input class="input" type="email" id="client-email" placeholder="votre@email.com" style="margin-bottom:0;flex:1">'+
  '<button onclick="saveEmail()" style="background:#e8a87c;border:none;color:#0a0a0a;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer">✓</button></div>')+
'</div>';

  return html;
}

function renderJaugesTab(){
  if(!state.products.length)return '<div style="text-align:center;color:#555;padding:24px">Chargement...</div>';
  let html='<div class="section-title">Mes points par produit</div>';
  state.products.forEach(function(p){
    var val=state.clientPoints[p.id]||0;
    var prog=(val/p.seuil)*100;
    var restant=p.seuil-val;
    html+='<div class="gauge-row">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
      '<span style="font-size:20px">'+p.icon+'</span>'+
      '<span style="font-size:14px;color:#f5f2ee;font-weight:500">'+p.nom+'</span></div>'+
      '<div style="font-size:15px;font-weight:700;color:#e8a87c;font-family:monospace">'+val+'/'+p.seuil+'</div></div>'+
      '<div class="gauge-bar"><div class="gauge-fill" style="width:'+Math.min(100,prog)+'%;background:'+(prog>=80?'#7ec87e':prog>=50?'#f9d056':'#c8956c')+'"></div></div>'+
      '<div style="font-size:11px;color:#666;margin-top:5px">'+(restant===0?'🎉 Récompense disponible ! Parlez-en au caissier':restant+' achat'+(restant>1?'s':'')+' avant 1 '+p.nom+' offert')+'</div></div>';
  });
  html+='<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:12px;padding:12px 16px;margin-top:4px;font-size:12px;color:#666;line-height:1.7">'+
    '💬 Montrez votre QR code au caissier pour faire valoir vos récompenses.</div>';
  return html;
}

function renderNiveauxTab(c,isVip){
  let html='<div class="section-title">Ma progression</div>';
  html+='<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:16px;padding:16px;margin-bottom:16px">';
  LEVEL_ORDER.forEach(function(niv,i){
    var r=state.recompensesNiveaux.find(function(x){return x.niveau===niv;});
    var current=(c.niveau_actuel||'Bronze')===niv;
    var done=LEVEL_ORDER.indexOf(c.niveau_actuel||'Bronze')>i;
    var lv=LEVELS.find(function(l){return l.name===niv;});
    html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;opacity:'+(done?0.5:1)+'">'+
      '<div style="width:12px;height:12px;border-radius:50%;flex-shrink:0;background:'+(done?'#555':current?lv.color:'#333')+';box-shadow:'+(current?'0 0 10px '+lv.color:'none')+'"></div>'+
      '<div style="flex:1">'+
      '<div style="font-size:14px;font-weight:'+(current?700:400)+';color:'+(done?'#555':current?lv.color:'#aaa')+'">'+niv+(current?' ← Niveau actuel':'')+(done?' ✓':'')+'</div>'+
      (r?'<div style="font-size:12px;color:#666;margin-top:2px">🎁 '+r.description+'</div>':'')+
      '</div>'+
      (current&&r&&c.points>=r.points_requis?'<span style="font-size:11px;color:#7ec87e;font-weight:700">Dispo !</span>':'')+
      '</div>';
  });
  html+='<div style="background:#1e1e2e;border-radius:10px;padding:10px 14px;font-size:12px;color:#666;line-height:1.6;margin-top:4px">'+
    '💬 Demandez au caissier d\'utiliser votre récompense pour passer au niveau suivant.</div></div>';

  if(isVip){
    html+='<div style="background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.05));border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:16px;margin-bottom:16px">'+
      '<div style="font-size:14px;color:#ffd700;font-weight:700;margin-bottom:10px">★ Avantages VIP</div>'+
      '<div style="display:flex;flex-direction:column;gap:8px">'+
      '<div style="font-size:13px;color:#f5f2ee">✓ Bonus <strong>+'+c.vip_bonus+'%</strong> sur tous vos points</div>'+
      (state.recompenseVip?'<div style="font-size:13px;color:#f5f2ee">✓ Récompense mensuelle : <strong>'+state.recompenseVip.description+'</strong></div>':'')+
      (c.anniversaire?'<div style="font-size:13px;color:#f5f2ee">✓ Cadeau anniversaire le '+c.anniversaire.slice(8,10)+'/'+c.anniversaire.slice(5,7)+'</div>':'')+
      '</div></div>';
  } else {
    html+='<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:16px;padding:16px;text-align:center">'+
      '<div style="font-size:20px;margin-bottom:8px">★</div>'+
      '<div style="font-size:14px;color:#aaa;font-weight:600;margin-bottom:6px">Devenez client VIP</div>'+
      '<div style="font-size:12px;color:#666;line-height:1.6">Bonus de points, récompense mensuelle et cadeau anniversaire.<br>Demandez à votre caissier !</div></div>';
  }
  return html;
}

function renderHistoryTab(){
  var cutoff=oneYearAgo();
  let html='<div class="section-title">Historique</div>'+
    '<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#666">'+
    '⏳ Les points expirent 1 an après chaque transaction</div>'+
    '<div class="tx-list">';
  if(!state.transactions.length){
    html+='<div style="text-align:center;color:#333;font-size:13px;padding:24px">Aucune transaction</div>';
  }
  state.transactions.slice(0,30).forEach(function(tx){
    var txDate=tx.created_at&&tx.created_at.split('T')[0];
    var expired=txDate&&txDate<cutoff;
    var expiryWarning='';
    if(!expired&&tx.points>0&&tx.type==='earn'){
      var limit=new Date(txDate);
      limit.setFullYear(limit.getFullYear()+1);
      var daysLeft=Math.ceil((limit-new Date())/(1000*60*60*24));
      if(daysLeft<=30) expiryWarning=' · <span style="color:#e87070">expire dans '+daysLeft+'j</span>';
    }
    html+='<div class="tx-row" style="'+(expired?'opacity:.4':'')+'">'+
      '<div>'+
      '<div style="font-size:13px;color:'+(expired?'#555':'#f5f2ee')+';margin-bottom:2px">'+tx.label+'</div>'+
      '<div style="font-size:11px;color:#666">'+new Date(tx.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})+(expired?' · <span style="color:#e87070">Expiré</span>':expiryWarning)+'</div></div>'+
      '<div style="font-family:monospace;font-weight:700;font-size:13px;color:'+(expired?'#444':tx.type==='redeem'?'#e87070':tx.type==='bonus'?'#f9d056':'#7ec87e')+'">'+(tx.points>0?'+':'')+tx.points+' pt'+(Math.abs(tx.points)>1?'s':'')+'</div></div>';
  });
  html+='</div>';
  return html;
}

async function saveEmail(){
  var emailInput=document.getElementById('client-email');
  if(!emailInput)return;
  var val=emailInput.value.trim();
  if(!val||!val.includes('@'))return showToast('Email invalide','#e87070');
  // Récupérer les points à offrir depuis config
  const {data:config}=await sb.from('config').select('valeur').eq('cle','points_email').single();
  const ptsEmail=config?parseInt(config.valeur)||0:0;
  // Enregistrer l'email
  await sb.from('clients').update({email:val}).eq('id',state.client.id);
  state.client.email=val;
  // Offrir les points si configuré
  if(ptsEmail>0){
    const newPts=(state.client.points||0)+ptsEmail;
    await sb.from('clients').update({points:newPts}).eq('id',state.client.id);
    await sb.from('transactions').insert({
      client_id:state.client.id,
      label:'📧 Bienvenue ! Bonus inscription email',
      points:ptsEmail,
      type:'bonus',
      caissier_nom:'Système'
    });
    state.client.points=newPts;
    showToast('✅ Email enregistré ! +'+ptsEmail+' pts offerts !','#8fc98a');
  } else {
    showToast('✅ Email enregistré !','#8fc98a');
  }
  render();
}

function printQR(){
  var div=document.getElementById('qr-div-'+state.client.id);
  var canvas=div&&div.querySelector('canvas');
  if(!canvas)return;
  var win=window.open('','_blank');
  win.document.write('<html><head><title>Carte — '+state.client.nom+'</title>'+
    '<style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif}'+
    '.card{border:2px solid #c8956c;border-radius:16px;padding:24px;text-align:center;width:280px}</style></head>'+
    '<body><div class="card">'+
    '<div style="font-size:16px;font-weight:bold;color:#1a1410;margin-bottom:4px">'+SHOP_NAME+'</div>'+
    '<div style="font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">Carte Fidélité</div>'+
    '<img src="'+canvas.toDataURL()+'" width="160" height="160">'+
    '<div style="font-size:16px;font-weight:bold;margin-top:12px">'+state.client.nom+'</div>'+
    '<div style="font-size:11px;color:#aaa;margin-top:6px">Présentez ce QR code en caisse</div>'+
    '</div></body></html>');
  win.document.close();
  win.print();
}

function showToast(msg,color){
  color=color||'#8fc98a';
  state.toast={msg:msg,color:color};
  render();
  setTimeout(function(){state.toast=null;render();},3000);
}

render();
</script>
</body>
</html>
