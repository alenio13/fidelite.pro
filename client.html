const LEVELS=[
  {name:"Bronze",  min:0,    max:499,      color:"#c8956c"},
  {name:"Argent",  min:500,  max:999,      color:"#b0bec5"},
  {name:"Or",      min:1000, max:1999,     color:"#f9d056"},
  {name:"Platine", min:2000, max:Infinity, color:"#e0e0ff"},
];
const LEVEL_ORDER=["Bronze","Argent","Or","Platine"];
const NOUVEAU={name:"Nouveau",min:0,max:0,color:"#888"};

function buildLevels(){
  if(!state.recompensesNiveaux||!state.recompensesNiveaux.length) return LEVELS.slice();
  const recs=state.recompensesNiveaux.filter(r=>LEVEL_ORDER.includes(r.niveau)&&r.points_requis!=null).slice().sort((a,b)=>a.points_requis-b.points_requis);
  if(!recs.length) return LEVELS.slice();
  const dyn=recs.map(r=>{const base=LEVELS.find(l=>l.name===r.niveau);return {name:r.niveau,min:r.points_requis,color:base?base.color:"#c8956c"};});
  for(let i=0;i<dyn.length;i++){dyn[i].max=(i+1<dyn.length)?dyn[i+1].min-1:Infinity;}
  return dyn;
}
function getLevel(p){
  const dyn=buildLevels();
  if(!dyn.length||p<dyn[0].min) return {...NOUVEAU,max:(dyn[0]?dyn[0].min-1:0)};
  return dyn.find(l=>p>=l.min&&p<=l.max)||dyn[dyn.length-1];
}
function getNextLevel(p){
  const dyn=buildLevels();
  if(!dyn.length) return null;
  if(p<dyn[0].min) return dyn[0];
  for(let i=0;i<dyn.length;i++){if(p>=dyn[i].min&&p<=dyn[i].max) return dyn[i+1]||null;}
  return null;
}
function getBadgeClass(pts){const n=getLevel(pts).name;if(n==='Nouveau')return 'badge badge-nouveau';return n==='Argent'?'badge badge-argent':n==='Or'?'badge badge-or':n==='Platine'?'badge badge-platine':'badge';}

// Charge la liste des filleuls (clients que j'ai parrainés) + nom du parrain s'il y en a un
async function loadParrainage(){
  if(!state.client) return;
  const promises=[];
  // Mes filleuls
  promises.push(
    sb.from('clients').select('id,nom,created_at').eq('parrain_id',state.client.id).order('created_at',{ascending:false})
      .then(function(r){state.filleuls=r.data||[]})
  );
  // Mon parrain (s'il existe)
  if(state.client.parrain_id){
    promises.push(
      sb.from('clients').select('id,nom').eq('id',state.client.parrain_id).single()
        .then(function(r){state.parrainInfo=r.data||null})
    );

    state.parrainInfo=null;
  }
  await Promise.all(promises);

// === SÉCURITÉ QR ===
// Génère un token aléatoire cryptographiquement sûr (32 hex chars)
function generateRandomToken(){
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Génère un nouveau token, le stocke en DB et dans state.client
async function refreshQrToken(){
  if(!state.client||!state.client.id) return;
  const token = generateRandomToken();
  const expires = new Date(Date.now() + 24*3600*1000); // 24h de validité
  const {error} = await sb.from('clients').update({
    qr_token: token,
    qr_token_expires_at: expires.toISOString()
  }).eq('id', state.client.id);
  if(error){
    console.error('refreshQrToken failed:', error);
    return;
  }
  state.client.qr_token = token;
  state.client.qr_token_expires_at = expires.toISOString();
}

function generateQR(clientId){
  setTimeout(function(){
    const div=document.getElementById('qr-div-'+clientId);
    if(!div) return;
    // Si on a déjà un canvas et un token identique, ne pas régénérer
    const currentToken = div.dataset.token;
    if(div.querySelector('canvas') && currentToken === state.client.qr_token) return;
    // Reset si token différent (rotation)
    div.innerHTML = '';
    div.dataset.token = state.client.qr_token || '';
    if(!state.client.qr_token){
      div.innerHTML = '<div style="color:#666;font-size:11px;text-align:center;padding:20px">Génération...</div>';
      return;
    }
    // Format sécurisé : FL|{id}|{token}
    const payload = 'FL|' + clientId + '|' + state.client.qr_token;
    new QRCode(div,{text:payload,width:180,height:180,colorDark:'#000000',colorLight:'#ffffff'});
  },100);
}

// === PARRAINAGE ===
// Génère un code lisible (sans caractères ambigus 0/O/1/I/L)
function generateCodeParrainage(){
  const chars='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let code='';
  const arr=new Uint8Array(6);
  crypto.getRandomValues(arr);
  for(let i=0;i<6;i++) code+=chars[arr[i]%chars.length];
  return code;
}

// Garantit que le client a un code de parrainage en BDD (en génère un si manquant)
async function ensureCodeParrainage(){
  if(!state.client||!state.client.id) return;
  if(state.client.code_parrainage) return; // déjà un code
  // Tentatives avec retry en cas de collision (très improbable mais possible)
  for(let attempt=0; attempt<5; attempt++){
    const code=generateCodeParrainage();
    const {data,error}=await sb.from('clients').update({code_parrainage:code}).eq('id',state.client.id).select().single();
    if(!error && data){
      state.client.code_parrainage=code;
      return;
    }
    // Collision unique → on retry
  }
  console.error('Impossible de générer un code de parrainage unique');
}

// Récupère la config des points de parrainage (default 50)
async function getPointsParrainage(){
  const {data}=await sb.from('config').select('valeur').eq('cle','points_parrainage').single();
  return data?parseInt(data.valeur,10)||50:50;
}

// Récupère la limite mensuelle de parrainages par parrain (default 5)
async function getLimiteParrainage(){
  const {data}=await sb.from('config').select('valeur').eq('cle','points_parrainage_limite_mensuelle').single();
  return data?parseInt(data.valeur,10)||5:5;
}

// Compte les parrainages déjà effectués par ce parrain ces 30 derniers jours
async function countParrainagesRecents(parrainId){
  const since=new Date(Date.now()-30*24*3600*1000).toISOString();
  // On récupère tous les bonus du parrain ces 30j et on filtre en JS
  // (évite les soucis d'encodage emoji avec ilike côté Supabase)
  const {data}=await sb.from('transactions')
    .select('label,created_at')
    .eq('client_id',parrainId)
    .eq('type','bonus')
    .gte('created_at',since);
  if(!data) return 0;
  return data.filter(function(t){
    return t.label && t.label.indexOf('Parrainage de')!==-1;
  }).length;
}

// Applique le bonus de parrainage : ajoute X pts au parrain ET au filleul + crée 2 transactions
async function appliquerParrainage(filleul, codeParrain){
  const codeNorm=(codeParrain||'').toUpperCase().trim();
  if(!codeNorm) return {ok:false, msg:'Pas de code'};
  // Trouver le parrain
  const {data:parrain}=await sb.from('clients').select('*').eq('code_parrainage',codeNorm).single();
  if(!parrain) return {ok:false, msg:'Code de parrainage inconnu'};
  if(parrain.id===filleul.id) return {ok:false, msg:'Vous ne pouvez pas vous parrainer vous-même'};
  if(filleul.parrain_id) return {ok:false, msg:'Vous avez déjà été parrainé'};
  // Anti-abus : limite mensuelle de parrainages par parrain
  const [pts,limite,deja]=await Promise.all([
    getPointsParrainage(),
    getLimiteParrainage(),
    countParrainagesRecents(parrain.id),
  ]);
  if(deja>=limite){
    return {ok:false, msg:'Ce parrain a atteint sa limite mensuelle ('+limite+' parrainages/30j)'};
  }
  // Appliquer
  const newPtsParrain=(parrain.points||0)+pts;
  const newPtsFilleul=(filleul.points||0)+pts;
  await Promise.all([
    sb.from('clients').update({points:newPtsParrain}).eq('id',parrain.id),
    sb.from('clients').update({points:newPtsFilleul, parrain_id:parrain.id}).eq('id',filleul.id),
    sb.from('transactions').insert({client_id:parrain.id, label:'🎁 Parrainage de '+filleul.nom, points:pts, type:'bonus', caissier_nom:'Système'}),
    sb.from('transactions').insert({client_id:filleul.id, label:'🎁 Bienvenue par '+parrain.nom, points:pts, type:'bonus', caissier_nom:'Système'}),
  ]);
  filleul.points=newPtsFilleul;
  filleul.parrain_id=parrain.id;
  return {ok:true, pts:pts, parrain:parrain.nom};
}

async function creerCompteClient(){
  const nom=document.getElementById('nom-inscription')?.value?.trim();
  const tel=document.getElementById('tel-inscription')?.value?.trim();
  const pin=document.getElementById('pin-nouveau')?.value?.trim();
  const confirm=document.getElementById('pin-confirm')?.value?.trim();
  const codeParrain=(document.getElementById('code-parrainage')?.value||'').toUpperCase().trim();
  if(!nom||nom.length<2)return showToast('Entrez votre nom','#e87070');
  if(!tel)return showToast('Entrez votre numéro de téléphone','#e87070');
  if(!/^\d{10}$/.test(tel.replace(/\s/g,'')))return showToast('Numéro invalide (10 chiffres)','#e87070');
  if(!pin||pin.length!==4||!/^\d{4}$/.test(pin))return showToast('Le PIN doit être 4 chiffres','#e87070');
  if(pin!==confirm)return showToast('Les PIN ne correspondent pas','#e87070');

  // Vérifier si le numéro existe déjà
  const {data:existing}=await sb.from('clients').select('*').eq('telephone',tel).single();
  if(existing&&existing.pin){
    return showToast('Ce numéro a déjà un compte — connectez-vous','#e87070');
  }

  let client;
  if(existing&&!existing.pin){
    // Cas 1 : compte pré-créé par la caissière, le client définit son PIN
    const updates={pin};
    if(!existing.nom||existing.nom.trim()==='') updates.nom=nom;
    const {data:updated, error:updErr}=await sb.from('clients').update(updates).eq('id',existing.id).select().single();
    if(updErr||!updated){return showToast('Erreur activation : '+(updErr?.message||'inconnu'),'#e87070');}
    client=updated;
  } else {
    // Cas 2 : inscription totalement autonome (aucun compte préalable)
    const {data:created, error:insErr}=await sb.from('clients').insert({
      nom:nom,
      telephone:tel,
      pin:pin,
      points:0,
      vip:false,
      vip_bonus:0
    }).select().single();
    if(insErr||!created){return showToast('Erreur création : '+(insErr?.message||'inconnu'),'#e87070');}
    client=created;
  }

  state.client=client;
  state.loggedIn=true;

  // Appliquer le parrainage si code fourni
  let parrainageMsg='';
  if(codeParrain){
    const result=await appliquerParrainage(state.client, codeParrain);
    if(result.ok){
      parrainageMsg=' (+'+result.pts+' pts grâce à '+result.parrain+')';
    } else {
      showToast('⚠️ '+result.msg+' — compte créé sans parrainage','#e8a87c');
    }
  }

  await refreshQrToken();
  await ensureCodeParrainage();
  await Promise.all([loadProducts(),loadClientPoints(client.id),loadTransactions(client.id),loadRecompenses(),loadParrainage()]);
  cacheClientState();
  showToast('✅ Bienvenue '+state.client.nom+' !'+parrainageMsg,'#8fc98a');
  render();
}

async function loginClient(){
  const tel=document.getElementById('tel-input').value.trim();
  const pin=document.getElementById('pin-input').value.trim();
  if(!tel||!pin)return showToast('Entrez votre numéro et PIN','#e87070');
  const {data}=await sb.from('clients').select('*').eq('telephone',tel).eq('pin',pin).single();
  if(data){
    state.client=data;
    state.loggedIn=true;
    await refreshQrToken();
    await ensureCodeParrainage();

    cacheClientState();
    render();
  } else {
    showToast('Numéro ou PIN incorrect','#e87070');
  }
}

// Partage le code de parrainage via l'API navigator.share (sheet natif iOS/Android)
async function partagerParrainage(){
  if(!state.client||!state.client.code_parrainage) return;
  const url=window.location.origin+'/client.html?ref='+state.client.code_parrainage;
  const pts=await getPointsParrainage();
  const text='Rejoins-moi sur la carte fidélité de '+SHOP_NAME+' avec mon code '+state.client.code_parrainage+' et on gagne chacun '+pts+' pts ! 🎁';
  if(navigator.share){
    try{
      await navigator.share({title:SHOP_NAME, text:text, url:url});
    }catch(e){
      // L'utilisateur a annulé, pas d'erreur à afficher
    }
  } else {
    // Fallback : copier le lien dans le presse-papier
    try{
      await navigator.clipboard.writeText(text+' '+url);
      showToast('✅ Lien copié — partagez-le où vous voulez','#8fc98a');
    }catch(e){
      showToast('Impossible de partager — copiez votre code manuellement','#e87070');
    }
  }
}

function copierCodeParrainage(){
  if(!state.client||!state.client.code_parrainage) return;
  navigator.clipboard.writeText(state.client.code_parrainage).then(function(){
    showToast('✅ Code copié !','#8fc98a');
  }).catch(function(){
    showToast('Impossible de copier','#e87070');
  });
}

// Appliquer un code de parrainage rétroactivement (clients déjà inscrits sans parrain)

  const input=document.getElementById('appliquer-code');
  if(!input) return;
  const code=(input.value||'').toUpperCase().trim();
  if(!code) return showToast('Entrez un code','#e87070');
  if(state.client.parrain_id) return showToast('Vous avez déjà été parrainé','#e87070');
  const result=await appliquerParrainage(state.client, code);
  if(result.ok){
    // Recharger les transactions et infos parrainage
    await Promise.all([loadTransactions(state.client.id), loadParrainage()]);
    showToast('✅ Parrainage appliqué ! +'+result.pts+' pts grâce à '+result.parrain,'#8fc98a');
    render();
  } else {
    showToast('⚠️ '+result.msg,'#e87070');
  }
}

      '<div style="font-size:11px;color:#666;margin-top:5px">'+(restant===0?'🎉 Récompense disponible ! Parlez-en au caissier':restant+' achat'+(restant>1?'s':'')+' avant 1 '+p.nom+' offert')+'</div></div>';

function renderHistoryTab(){
  var cutoff=oneYearAgo();
  let html='<div class="section-title">Historique</div>'+
    '<div style="background:#2a2a3e;border:1px solid #3a3a50;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#666">'+
    '⏳ Les points expirent 1 an après chaque transaction</div>'+
    '<div class="tx-list">';
  if(!state.transactions.length){
    html+='<div style="text-align:center;color:#333;font-size:13px;padding:24px">Aucune transaction</div>';
  }
  state.transactions.slice(0,30).forEach(function(tx){
    var txDate=tx.created_at&&tx.created_at.split('T')[0];
    var expired=txDate&&txDate<cutoff;
    var expiryWarning='';
    if(!expired&&tx.points>0&&tx.type==='earn'){
      var limit=new Date(txDate);
      limit.setFullYear(limit.getFullYear()+1);
      var daysLeft=Math.ceil((limit-new Date())/(1000*60*60*24));
      if(daysLeft<=30) expiryWarning=' · <span style="color:#e87070">expire dans '+daysLeft+'j</span>';
    }
    html+='<div class="tx-row" style="'+(expired?'opacity:.4':'')+'">'+
      '<div>'+
      '<div style="font-size:13px;color:'+(expired?'#555':'#f5f2ee')+';margin-bottom:2px">'+tx.label+'</div>'+
      '<div style="font-size:11px;color:#666">'+new Date(tx.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})+(expired?' · <span style="color:#e87070">Expiré</span>':expiryWarning)+'</div></div>'+
      '<div style="font-family:monospace;font-weight:700;font-size:13px;color:'+(expired?'#444':tx.type==='redeem'?'#e87070':tx.type==='bonus'?'#f9d056':'#7ec87e')+'">'+(tx.points>0?'+':'')+tx.points+' pt'+(Math.abs(tx.points)>1?'s':'')+'</div></div>';
  });
  html+='</div>';
  return html;
}

async function saveEmail(){
  var emailInput=document.getElementById('client-email');
  if(!emailInput)return;
  var val=emailInput.value.trim();
  if(!val||!val.includes('@'))return showToast('Email invalide','#e87070');
  // Récupérer les points à offrir depuis config
  const {data:config}=await sb.from('config').select('valeur').eq('cle','points_email').single();
  const ptsEmail=config?parseInt(config.valeur)||0:0;
  // Enregistrer l'email
  await sb.from('clients').update({email:val}).eq('id',state.client.id);
  state.client.email=val;
  // Offrir les points si configuré
  if(ptsEmail>0){
    const newPts=(state.client.points||0)+ptsEmail;
    await sb.from('clients').update({points:newPts}).eq('id',state.client.id);
    await sb.from('transactions').insert({
      client_id:state.client.id,
      label:'📧 Bienvenue ! Bonus inscription email',
      points:ptsEmail,
      type:'bonus',
      caissier_nom:'Système'
    });
    state.client.points=newPts;
    showToast('✅ Email enregistré ! +'+ptsEmail+' pts offerts !','#8fc98a');
  } else {
    showToast('✅ Email enregistré !','#8fc98a');
  }
  render();
}


function showToast(msg,color){
  color=color||'#8fc98a';
  state.toast={msg:msg,color:color};
  render();
  setTimeout(function(){state.toast=null;render();},3000);
}

// === PWA INSTALLATION ===
let deferredInstallPrompt=null;

function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
}
function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isAndroid(){
  return /Android/i.test(navigator.userAgent);
}

// Capter le prompt d'install Android avant qu'il s'affiche tout seul
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredInstallPrompt=e;
  showInstallPromo();
});

// Détecter si l'app vient d'être installée
window.addEventListener('appinstalled',function(){
  deferredInstallPrompt=null;
  hideInstallPromo();
});

function showInstallPromo(){
  // Pas afficher si déjà installé
  if(isStandalone()) return;
  // Pas afficher si l'utilisateur a déjà refusé récemment
  var dismissed=safeLocalGet('install_dismissed');
  if(dismissed){
    var diff=Date.now()-parseInt(dismissed,10);
    if(diff<7*24*3600*1000) return; // 7 jours de pause après refus
  }
  var el=document.getElementById('install-promo');
  if(el) el.style.display='block';
}
function hideInstallPromo(){
  var el=document.getElementById('install-promo');
  if(el) el.style.display='none';
}

function handleInstallClick(){
  if(deferredInstallPrompt){
    // Android Chrome / desktop Chrome — prompt natif
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(function(choice){
      if(choice.outcome==='accepted'){
        showToast('✅ App installée !','#8fc98a');
        hideInstallPromo();
      } else {
        safeLocalSet('install_dismissed',Date.now().toString());
        hideInstallPromo();
      }
      deferredInstallPrompt=null;
    });
  } else if(isIOS()){
    // iOS Safari — pas de prompt natif, on affiche les instructions
    showIOSInstallModal();
  } else {
    // Autre cas — instructions génériques
    showToast('Utilise le menu de ton navigateur pour ajouter à l\'écran d\'accueil','#c8956c');
  }
}

  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fadeIn .3s';
  modal.innerHTML='<div style="background:#1e1e2e;border-radius:24px 24px 0 0;padding:28px 24px 32px;width:100%;max-width:480px;border-top:2px solid rgba(200,149,108,.4);position:relative">'+
    '<button onclick="closeIOSInstallModal()" style="position:absolute;top:14px;right:14px;background:#2a2a3e;border:none;color:#888;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer">×</button>'+
    '<div style="display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center">'+
      '<img src="/icons/icon-192.png" alt="" style="width:72px;height:72px;border-radius:16px;box-shadow:0 12px 28px rgba(0,0,0,.5)">'+
      '<div>'+
        '<div style="font-size:17px;font-weight:700;color:#f5f2ee;margin-bottom:4px">Installer Ma Carte</div>'+
        '<div style="font-size:13px;color:#888">Suivez ces 2 étapes simples</div>'+
      '</div>'+
      '<div style="width:100%;background:#2a2a3e;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:14px">'+
        // Étape 1
        '<div style="display:flex;align-items:center;gap:12px;text-align:left">'+
          '<div style="width:32px;height:32px;border-radius:50%;background:rgba(200,149,108,.2);border:1px solid rgba(200,149,108,.4);display:flex;align-items:center;justify-content:center;color:#e8a87c;font-size:13px;font-weight:700;flex-shrink:0">1</div>'+
          '<div style="flex:1;font-size:13px;color:#ccc">'+
            'Touchez l\'icône <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#3a3a52;border-radius:6px;vertical-align:middle;margin:0 2px">'+
              '<svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1v9M3 5l4-4 4 4M2 11v3a1 1 0 001 1h8a1 1 0 001-1v-3" stroke="#5e9eff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
            '</span> Partager dans la barre du bas Safari'+
          '</div>'+
        '</div>'+
        // Étape 2
        '<div style="display:flex;align-items:center;gap:12px;text-align:left">'+
          '<div style="width:32px;height:32px;border-radius:50%;background:rgba(200,149,108,.2);border:1px solid rgba(200,149,108,.4);display:flex;align-items:center;justify-content:center;color:#e8a87c;font-size:13px;font-weight:700;flex-shrink:0">2</div>'+
          '<div style="flex:1;font-size:13px;color:#ccc">Sélectionnez <strong style="color:#f5f2ee">"Sur l\'écran d\'accueil"</strong> puis Ajouter</div>'+
        '</div>'+
      '</div>'+
      '<button onclick="closeIOSInstallModal()" style="background:#c8956c;color:#fff;border:none;border-radius:12px;padding:13px 28px;font-size:14px;font-weight:700;cursor:pointer;width:100%">J\'ai compris</button>'+
    '</div>'+
  '</div>';
  document.body.appendChild(modal);
}
function closeIOSInstallModal(){
  var m=document.getElementById('ios-install-modal');
  if(m) m.remove();
}

// Au chargement : si iOS et pas installé, montrer la promo (pas de beforeinstallprompt sur iOS)
window.addEventListener('load',function(){
  setTimeout(function(){
    if(isIOS()&&!isStandalone()){
      showInstallPromo();
    }
  },500);
});

// === SERVICE WORKER (mode offline) ===
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/service-worker.js')
      .then(function(reg){console.log('SW enregistré',reg.scope);})
      .catch(function(err){console.warn('SW erreur',err);});
  });
}

// === INDICATEUR HORS-LIGNE ===
function updateOfflineIndicator(){
  var existing=document.getElementById('offline-indicator');
  if(!navigator.onLine){
    if(!existing){
      var bar=document.createElement('div');
      bar.id='offline-indicator';
      bar.style.cssText='position:fixed;top:0;left:0;right:0;background:#3a3a52;color:#e8a87c;text-align:center;padding:8px;font-size:12px;font-weight:600;z-index:9998;letter-spacing:1px';
      bar.innerHTML='⚠ Mode hors-ligne — votre carte reste accessible';
      document.body.insertBefore(bar,document.body.firstChild);
    }
  } else if(existing){
    existing.remove();
  }
}
window.addEventListener('online',updateOfflineIndicator);
window.addEventListener('offline',updateOfflineIndicator);
updateOfflineIndicator();

// === CACHE DE L'ÉTAT CLIENT (pour affichage offline) ===
function cacheClientState(){
  if(state.client && state.loggedIn){
    safeLocalSet('cache_client',JSON.stringify(state.client));
    safeLocalSet('cache_transactions',JSON.stringify(state.transactions||[]));
    safeLocalSet('cache_clientPoints',JSON.stringify(state.clientPoints||{}));
    safeLocalSet('cache_products',JSON.stringify(state.products||[]));
    safeLocalSet('cache_recompensesNiveaux',JSON.stringify(state.recompensesNiveaux||[]));
    safeLocalSet('cache_recompenseVip',JSON.stringify(state.recompenseVip||null));
    safeLocalSet('cache_filleuls',JSON.stringify(state.filleuls||[]));
    safeLocalSet('cache_parrainInfo',JSON.stringify(state.parrainInfo||null));
    safeLocalSet('cache_timestamp',Date.now().toString());
  }
}

function tryRestoreOfflineState(){
  // Si on est hors-ligne ET pas connecté ET qu'on a un cache → restaurer
  if(!navigator.onLine && !state.loggedIn){
    var cachedClient=safeLocalGet('cache_client');
    if(cachedClient){
      try{
        state.client=JSON.parse(cachedClient);
        state.transactions=JSON.parse(safeLocalGet('cache_transactions')||'[]');
        state.clientPoints=JSON.parse(safeLocalGet('cache_clientPoints')||'{}');
        state.products=JSON.parse(safeLocalGet('cache_products')||'[]');
        state.recompensesNiveaux=JSON.parse(safeLocalGet('cache_recompensesNiveaux')||'[]');
        state.recompenseVip=JSON.parse(safeLocalGet('cache_recompenseVip')||'null');
        state.filleuls=JSON.parse(safeLocalGet('cache_filleuls')||'[]');
        state.parrainInfo=JSON.parse(safeLocalGet('cache_parrainInfo')||'null');
        state.loggedIn=true;
        var ts=safeLocalGet('cache_timestamp');
        if(ts){
          var age=Math.floor((Date.now()-parseInt(ts,10))/(1000*60));
          showToast('📵 Données en cache (il y a '+age+' min)','#e8a87c');
        }
        return true;
      }catch(e){return false;}
    }
  }
  return false;
}

// Tenter de restaurer depuis le cache au chargement, puis render
tryRestoreOfflineState();

render();
</script>
