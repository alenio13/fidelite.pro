<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La craquante de lesigny</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0ece4;font-family:'Helvetica Neue',sans-serif;min-height:100vh}
.app{max-width:460px;margin:0 auto;padding:24px 16px 80px}
.header{text-align:center;margin-bottom:20px}
.header-sub{font-size:10px;letter-spacing:4px;color:#333;text-transform:uppercase;margin-bottom:4px}
.header-title{font-size:22px;letter-spacing:1px;color:#e8e2d8}
.badge{background:rgba(200,149,108,.15);color:#c8956c;border:1px solid rgba(200,149,108,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;font-family:monospace}
.badge-argent{background:rgba(176,190,197,.15);color:#b0bec5;border-color:rgba(176,190,197,.3)}
.badge-or{background:rgba(249,208,86,.15);color:#f9d056;border-color:rgba(249,208,86,.3)}
.badge-platine{background:rgba(224,224,255,.15);color:#e0e0ff;border-color:rgba(224,224,255,.3)}
.view-switch{display:flex;gap:6px;margin-bottom:20px}
.view-btn{flex:1;padding:10px 0;border-radius:14px;background:#0d0d0d;border:1px solid #141414;color:#2e2e2e;font-size:12px;cursor:pointer;transition:all .2s;text-align:center}
.view-btn div:last-child{font-size:9px;margin-top:2px;opacity:.6}
.view-btn.active{background:#1a1a1a;color:#e0ddd8;border-color:#333}
.view-btn.active-client{background:#1a1a1a;border-color:rgba(200,149,108,.4);color:#c8956c}
.view-btn.active-patron{background:#1a1a1a;border-color:rgba(249,208,86,.4);color:#f9d056}
.tabs{display:flex;gap:4px;background:#111;border-radius:14px;padding:5px;margin-bottom:20px;flex-wrap:wrap}
.tab{flex:1;min-width:55px;padding:9px 4px;font-size:11px;background:transparent;border:1px solid transparent;color:#555;border-radius:10px;cursor:pointer;transition:all .2s;text-align:center}
.tab.active{background:#1e1e1e;font-weight:700}
.section-title{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:10px}
.input{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;padding:13px 16px;color:#e0ddd8;font-size:14px;outline:none;width:100%;margin-bottom:12px}
.input::placeholder{color:#333}
.input-sm{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;color:#e0ddd8;font-size:13px;outline:none;width:100%}
.btn-primary{width:100%;background:#c8956c;color:#0a0a0a;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border-radius:30px;padding:12px 26px;font-size:14px;font-weight:600;box-shadow:0 8px 40px rgba(0,0,0,.6);z-index:999;white-space:nowrap;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.product-btn{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:12px 10px;cursor:pointer;text-align:left;transition:all .18s;position:relative;width:100%}
.product-btn.selected{background:#181818;border-color:rgba(200,149,108,.5)}
.qty-badge{position:absolute;top:8px;right:8px;background:#c8956c;color:#0a0a0a;border-radius:50%;width:22px;height:22px;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
.colis-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.colis-btn{background:rgba(126,184,212,.08);border:1px solid rgba(126,184,212,.3);border-radius:14px;padding:16px 10px;cursor:pointer;text-align:center;transition:all .2s}
.reward-alert{background:linear-gradient(135deg,#1a2e1a,#0d1a0d);border:2px solid #7ec87e;border-radius:16px;padding:18px;margin-bottom:16px;animation:pulse .8s ease-in-out}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(126,200,126,.4)}50%{box-shadow:0 0 0 8px rgba(126,200,126,0)}}
.gauge-grid{display:flex;flex-direction:column;gap:10px}
.gauge-row{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:12px 16px}
.gauge-bar{height:8px;background:#1a1a1a;border-radius:8px;overflow:hidden}
.gauge-fill{height:100%;border-radius:8px;transition:width .6s ease}
.card-visual{background:linear-gradient(135deg,#1a1410 0%,#0d0d0d 100%);border-radius:24px;padding:24px 24px 20px;position:relative;overflow:hidden;margin-bottom:16px}
.progress-bar{height:4px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;margin:12px 0 6px}
.progress-fill{height:100%;border-radius:4px;transition:width 1s ease}
.client-found{background:#0d1a0d;border:1px solid #1a2e1a;border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.summary-box{background:#111;border:1px solid rgba(200,149,108,.2);border-radius:16px;padding:16px;margin-bottom:14px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #161616;font-size:13px}
.summary-row:last-child{border-bottom:none}
.back-btn{background:none;border:none;color:#666;font-size:13px;cursor:pointer;margin-bottom:16px;padding:0}
.cart-bar{position:sticky;bottom:0;padding-top:12px}
.cart-btn{width:100%;background:#c8956c;color:#0a0a0a;border:none;border-radius:14px;padding:14px 20px;font-size:14px;font-weight:800;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -20px 40px #0a0a0a}
.pay-btn{width:100%;background:#c8956c;color:#0a0a0a;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px}
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px}
.empty{text-align:center;color:#252525;font-size:13px;padding:16px 0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:16px;text-align:center}
.stat-val{font-size:26px;font-weight:800;color:#c8956c;font-family:monospace}
.stat-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.caissier-row{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.del-btn{background:rgba(232,112,112,.1);border:1px solid rgba(232,112,112,.3);color:#e87070;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}
.client-row{background:#111;border:1px solid #1c1c1c;border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer;transition:all .2s}
.client-row:hover{background:#161616;border-color:rgba(200,149,108,.3)}
.tx-row{background:#111;border:1px solid #1c1c1c;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.tx-list{display:flex;flex-direction:column;gap:7px}
.qr-section{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:18px;margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.qr-div{border-radius:12px;background:#fff;padding:10px;display:flex;align-items:center;justify-content:center}
.scan-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.scan-box{position:relative;width:280px;height:280px;border-radius:20px;overflow:hidden}
.scan-box video{width:100%;height:100%;object-fit:cover}
.scan-corners{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.scan-corners::before,.scan-corners::after{content:'';position:absolute;width:40px;height:40px;border-color:#c8956c;border-style:solid}
.scan-corners::before{top:10px;left:10px;border-width:3px 0 0 3px;border-radius:6px 0 0 0}
.scan-corners::after{bottom:10px;right:10px;border-width:0 3px 3px 0;border-radius:0 0 6px 0}
.scan-line{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,#c8956c,transparent);animation:scanAnim 2s linear infinite}
@keyframes scanAnim{0%{top:10%}100%{top:90%}}
.scan-close{background:#1a1a1a;border:1px solid #333;color:#ccc;border-radius:12px;padding:12px 28px;font-size:14px;cursor:pointer}
.produit-row{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:14px 16px;margin-bottom:10px}
#barcode-input{position:fixed;opacity:0;pointer-events:none;top:-999px}
</style>
</head>
<body>
<div id="root"></div>
<input id="barcode-input" type="text" autocomplete="off">
<script>
const SUPABASE_URL = 'https://tgrqfrijwjonrehixgre.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Dk_GsamMzY1KRRIELRxngQ_xsH1Xxkr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SHOP_NAME = "La craquante de lesigny";
const PATRON_PWD = "patron2024"; // ← Changez !

const LEVELS=[
  {name:"Bronze",min:0,max:499,color:"#c8956c"},
  {name:"Argent",min:500,max:999,color:"#b0bec5"},
  {name:"Or",min:1000,max:1999,color:"#f9d056"},
  {name:"Platine",min:2000,max:Infinity,color:"#e0e0ff"},
];
function getLevel(p){return LEVELS.find(l=>p>=l.min&&p<=l.max)||LEVELS[0]}
function getBadgeClass(pts){const n=getLevel(pts).name;return n==='Argent'?'badge badge-argent':n==='Or'?'badge badge-or':n==='Platine'?'badge badge-platine':'badge'}
function today(){return new Date().toISOString().split('T')[0]}

// ── ÉTAT ──────────────────────────────────────────────────────────────────────
let state={
  view:'login',role:null,
  caissierActif:null,
  client:null,transactions:[],
  clientPoints:{}, // {produit_id: points}
  products:[],
  cart:{},
  colisToday:false,lastColisData:null,
  step:'catalog',
  clientTab:'card',
  patronTab:'stats',
  selectedClient:null,selectedClientTx:[],selectedClientPoints:{},
  clientSearch:'',
  scanning:false,toast:null,
  caissiers:[],allTransactions:[],allClients:[],
  editingProduct:null,
  recompensesNiveaux:[],
  bonusPoints:[],
  editingRecompense:null,
};

// ── PRODUITS ──────────────────────────────────────────────────────────────────
async function loadProducts(){
  const {data}=await sb.from('produits').select('*').eq('actif',true).order('ordre');
  state.products=data||[];
}

// ── POINTS PRODUITS ───────────────────────────────────────────────────────────
async function loadClientPoints(clientId){
  const {data}=await sb.from('points_produits').select('*').eq('client_id',clientId);
  state.clientPoints={};
  (data||[]).forEach(r=>{state.clientPoints[r.produit_id]=r.points;});
}

async function upsertClientPoints(clientId, produitId, newPoints){
  await sb.from('points_produits').upsert(
    {client_id:clientId, produit_id:produitId, points:newPoints},
    {onConflict:'client_id,produit_id'}
  );
}

// ── SCANNER ───────────────────────────────────────────────────────────────────
let scanVideo=null,scanCanvas=null,scanCtx=null,scanAF=null;
async function startScan(){
  state.scanning=true;render();
  await new Promise(r=>setTimeout(r,100));
  scanVideo=document.getElementById('scan-video');
  scanCanvas=document.getElementById('scan-canvas');
  if(!scanVideo||!scanCanvas)return;
  scanCtx=scanCanvas.getContext('2d');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    scanVideo.srcObject=stream;scanVideo.play();
    scanVideo.addEventListener('loadedmetadata',()=>{scanLoop();});
  }catch(e){showToast('Caméra non disponible','#e87070');stopScan();}
}
function scanLoop(){
  if(!state.scanning)return;
  if(scanVideo.readyState===scanVideo.HAVE_ENOUGH_DATA){
    scanCanvas.width=scanVideo.videoWidth;scanCanvas.height=scanVideo.videoHeight;
    scanCtx.drawImage(scanVideo,0,0);
    const img=scanCtx.getImageData(0,0,scanCanvas.width,scanCanvas.height);
    const code=jsQR(img.data,img.width,img.height);
    if(code&&code.data.startsWith('FL-')){stopScan();handleQRScan(code.data);return;}
  }
  scanAF=requestAnimationFrame(scanLoop);
}
function stopScan(){
  state.scanning=false;
  if(scanAF)cancelAnimationFrame(scanAF);
  if(scanVideo&&scanVideo.srcObject)scanVideo.srcObject.getTracks().forEach(t=>t.stop());
  render();
}
async function handleQRScan(qrData){
  const clientId=qrData.replace('FL-','');
  const {data}=await sb.from('clients').select('*').eq('id',clientId).single();
  if(data){await loadClient(data);showToast(`✅ ${data.nom} identifié !`,'#8fc98a');render();}
  else showToast('QR code non reconnu','#e87070');
}
let barcodeBuffer='',barcodeTimer=null;
document.addEventListener('keydown',e=>{
  if(state.view!=='cashier'||state.role!=='caissier')return;
  const active=document.activeElement;
  if(active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'))return;
  if(e.key==='Enter'){if(barcodeBuffer.startsWith('FL-'))handleQRScan(barcodeBuffer);barcodeBuffer='';}
  else if(e.key.length===1){barcodeBuffer+=e.key;clearTimeout(barcodeTimer);barcodeTimer=setTimeout(()=>{barcodeBuffer='';},200);}
});
function generateQR(clientId){
  setTimeout(()=>{
    const div=document.getElementById('qr-div-'+clientId);
    if(!div||div.querySelector('canvas'))return;
    new QRCode(div,{text:'FL-'+clientId,width:180,height:180,colorDark:'#000000',colorLight:'#ffffff'});
  },100);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(state.scanning){root.innerHTML=renderScanner();return;}
  if(state.view==='login'){root.innerHTML=renderLogin();return;}
  root.innerHTML=`
    ${state.toast?`<div class="toast" style="border:1px solid ${state.toast.color}77;color:${state.toast.color}">${state.toast.msg}</div>`:''}
    <div class="app">
      <div class="header"><div class="header-sub">boulangerie · programme fidélité</div><div class="header-title">${SHOP_NAME}</div></div>
      <div class="view-switch">
        ${state.role==='patron'?`<button class="view-btn active-patron"><div>👑 Patron</div><div>Tableau de bord</div></button>`:''}
        ${state.role==='caissier'?`<button class="view-btn active"><div>🏪 Caisse</div><div>${state.caissierActif?state.caissierActif.nom:'Caissier'}</div></button>`:''}
        ${state.role==='client'?`<button class="view-btn active active-client"><div>👤 Client</div><div>Ma carte</div></button>`:''}
        <button class="view-btn" onclick="logout()" style="color:#444;max-width:55px"><div>⏏️</div><div>Quitter</div></button>
      </div>
      ${state.client&&state.view!=='patron'?renderClientStrip():''}
      ${state.role==='patron'?renderPatron():state.view==='cashier'?renderCashier():renderClient()}
    </div>`;
  if(state.view==='client'&&state.clientTab==='card'&&state.client)generateQR(state.client.id);
}

function renderClientStrip(){
  const c=state.client;
  return`<div style="background:#111;border:1px solid rgba(200,149,108,.15);border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
    <div style="display:flex;gap:8px;align-items:center">
      <span class="${getBadgeClass(c.points)}">${getLevel(c.points).name}</span>
      <span style="font-size:13px;color:#777">${c.nom}</span>
    </div>
    <span style="font-size:15px;font-weight:700;color:#c8956c;font-family:monospace">${c.points} pts</span>
  </div>`;
}
function renderScanner(){return`
  <canvas id="scan-canvas" style="display:none"></canvas>
  <div class="scan-overlay">
    <div style="font-size:13px;color:#888;letter-spacing:2px;text-transform:uppercase">Scanner la carte client</div>
    <div class="scan-box"><video id="scan-video" playsinline muted></video><div class="scan-corners"></div><div class="scan-line"></div></div>
    <div style="font-size:13px;color:#666;text-align:center;max-width:260px">Pointez la caméra vers le QR code</div>
    <button class="scan-close" onclick="stopScan()">✕ Annuler</button>
  </div>`;}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function renderLogin(){return`
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px">
    <div style="text-align:center">
      <div class="header-sub">boulangerie · programme fidélité</div>
      <div class="header-title" style="font-size:22px">${SHOP_NAME}</div>
    </div>
    <div style="background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:28px 24px;width:100%;max-width:380px">
      <div style="font-size:20px;font-weight:700;margin-bottom:18px;text-align:center">Connexion</div>
      <div style="background:#0d0d0d;border:1px solid rgba(249,208,86,.2);border-radius:14px;padding:14px;margin-bottom:12px">
        <div style="font-size:12px;color:#f9d056;font-weight:700;margin-bottom:10px">👑 Patron</div>
        <input class="input" type="password" id="patron-pwd" placeholder="Mot de passe patron" onkeydown="if(event.key==='Enter')loginPatron()">
        <button onclick="loginPatron()" style="width:100%;background:rgba(249,208,86,.15);border:1px solid rgba(249,208,86,.3);color:#f9d056;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">Connexion</button>
      </div>
      <div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:14px;margin-bottom:12px">
        <div style="font-size:12px;color:#c8956c;font-weight:700;margin-bottom:10px">🏪 Caissier</div>
        <input class="input" type="text" id="caissier-code" placeholder="Votre code caissier" onkeydown="if(event.key==='Enter')loginCaissier()">
        <button onclick="loginCaissier()" class="btn-primary">Connexion</button>
      </div>
      <div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:14px">
        <div style="font-size:12px;color:#888;font-weight:700;margin-bottom:10px">👤 Client</div>
        <input class="input" type="tel" id="tel-input" placeholder="Numéro de téléphone" onkeydown="if(event.key==='Enter')loginClient()">
        <input class="input" type="password" id="pin-input" placeholder="Code PIN à 4 chiffres" maxlength="4" onkeydown="if(event.key==='Enter')loginClient()">
        <button onclick="loginClient()" style="width:100%;background:#1a1a1a;border:1px solid rgba(200,149,108,.3);color:#c8956c;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer">Voir ma carte</button>
      </div>
    </div>
  </div>`;}

async function loginPatron(){
  const pwd=document.getElementById('patron-pwd').value;
  if(pwd===PATRON_PWD){state.role='patron';state.view='patron';await loadPatronData();render();}
  else showToast('Mot de passe incorrect','#e87070');
}
async function loginCaissier(){
  const code=document.getElementById('caissier-code').value.trim();
  if(!code)return;
  const {data}=await sb.from('caissiers').select('*').eq('code',code).eq('actif',true).single();
  if(data){
    state.role='caissier';state.caissierActif=data;state.view='cashier';
    await loadProducts();
    const [{data:rn},{data:bp}]=await Promise.all([
      sb.from('recompenses_niveaux').select('*').eq('actif',true),
      sb.from('bonus_points').select('*').eq('actif',true).order('ordre'),
    ]);
    state.recompensesNiveaux=rn||[];state.bonusPoints=bp||[];
    render();
  }
  else showToast('Code invalide ou désactivé','#e87070');
}
async function loginClient(){
  const tel=document.getElementById('tel-input').value.trim();
  const pin=document.getElementById('pin-input').value.trim();
  if(!tel||!pin)return showToast('Entrez numéro et PIN','#e87070');
  const {data}=await sb.from('clients').select('*').eq('telephone',tel).eq('pin',pin).single();
  if(data){state.role='client';state.view='client';await loadClient(data);await loadProducts();render();}
  else showToast('Numéro ou PIN incorrect','#e87070');
}
function logout(){
  Object.assign(state,{view:'login',role:null,caissierActif:null,client:null,transactions:[],clientPoints:{},cart:{},colisToday:false,step:'catalog',selectedClient:null,clientTab:'card',products:[]});
  render();
}
async function loadClient(data){
  state.client=data;
  state.colisToday=(data.last_colis===today());
  await Promise.all([loadTransactions(data.id),loadClientPoints(data.id)]);
}

// ── CAISSE ────────────────────────────────────────────────────────────────────
function renderCashier(){
  if(state.step==='done')return`
    <div class="done-screen"><div style="font-size:56px">✅</div>
    <div style="font-size:20px;font-weight:700;color:#8fc98a">Paiement validé !</div>
    <div style="font-size:13px;color:#555">Points mis à jour</div></div>`;

  const items=state.products.filter(p=>(state.cart[p.id]||0)>0);
  const total=items.reduce((s,p)=>s+p.prix*(state.cart[p.id]||0),0);
  const cartCount=Object.values(state.cart).reduce((s,v)=>s+v,0);
  if(state.step==='summary')return renderSummary(items,total);

  return`

}

      <div style="text-align:center;font-size:11px;color:#333;margin-bottom:10px">— ou rechercher manuellement —</div>
      <input class="input" type="tel" id="search-tel" placeholder="Numéro de téléphone" style="margin-bottom:8px" onkeydown="if(event.key==='Enter')searchClient()">

      </div>

function renderSummary(items,total){
  // Calculer récompenses
  const rewards=[];
  items.forEach(p=>{
    const qty=state.cart[p.id]||0;
    const before=state.clientPoints[p.id]||0;
    const after=before+qty;
    const r=Math.floor(after/p.seuil)-Math.floor(before/p.seuil);
    if(r>0)rewards.push({p,count:r});
  });

  return`
    <button class="back-btn" onclick="state.step='catalog';render()">← Modifier la commande</button>
    ${rewards.map(r=>`
      <div class="reward-alert">
        <div style="font-size:13px;color:#7ec87e;font-weight:700;margin-bottom:4px">🎉 Récompense débloquée !</div>
        <div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:4px">${r.count}× ${r.p.nom} offert${r.count>1?'s':''} ${r.p.icon}</div>
        <div style="font-size:12px;color:#7ec87e">À offrir au client maintenant</div>
      </div>`).join('')}
    <div class="summary-box" style="margin-bottom:14px">
      ${items.map(p=>`
        <div class="summary-row">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:18px">${p.icon}</span>
            <div>
              <div style="font-size:14px;color:#ddd">${state.cart[p.id]}× ${p.nom}</div>
              <div style="font-size:11px;color:#c8956c">+${state.cart[p.id]} pt${state.cart[p.id]>1?'s':''} ${p.icon}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:13px;color:#aaa">${(p.prix*(state.cart[p.id]||0)).toFixed(2)} €</span>
            <button onclick="removeFromCart('${p.id}')" style="width:22px;height:22px;border-radius:50%;background:#2a2a2a;border:none;color:#888;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button>
          </div>
        </div>`).join('')}
    </div>

    <!-- Aperçu jauges -->
    <div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:14px;padding:14px;margin-bottom:14px">
      <div class="section-title" style="margin-bottom:10px">Points après cet achat</div>
      ${items.map(p=>{
        const qty=state.cart[p.id]||0;
        const before=state.clientPoints[p.id]||0;
        const afterTotal=before+qty;
        const afterMod=afterTotal%p.seuil;
        const prog=(afterMod/p.seuil)*100;
        const reste=afterMod===0?0:p.seuil-afterMod;
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span style="color:#ddd">${p.icon} ${p.nom}</span>
            <span style="color:#777">${afterMod===0&&afterTotal>0?'🎁 Offert !':reste>0?reste+' restant'+(reste>1?'s':''):'Prochain: '+p.seuil}</span>
          </div>
          <div class="gauge-bar"><div class="gauge-fill" style="width:${afterMod===0&&afterTotal>0?100:prog}%;background:${prog>=80||afterMod===0?'#7ec87e':prog>=50?'#f9d056':'#c8956c'}"></div></div>
        </div>`;
      }).join('')}
    </div>

    <div class="summary-box">
      <div class="summary-row">
        <span style="font-size:18px;font-weight:700">Total</span>
        <span style="font-size:20px;font-weight:700;color:#c8956c">${total.toFixed(2)} €</span>
      </div>
    </div>
    <button class="pay-btn" onclick="handlePay()">💳 Encaisser · ${total.toFixed(2)} €</button>`;
}

// ── ACTIONS CAISSE ────────────────────────────────────────────────────────────
function addToCart(id){state.cart[id]=(state.cart[id]||0)+1;render();}
function removeFromCart(id){state.cart[id]=Math.max(0,(state.cart[id]||0)-1);render();}
function clearClient(){state.client=null;state.transactions=[];state.clientPoints={};state.colisToday=false;render();}
function showNewClient(){const f=document.getElementById('new-client-form');if(f)f.style.display=f.style.display==='none'?'block':'none';}
function showChangePIN(){const f=document.getElementById('change-pin-form');if(f)f.style.display=f.style.display==='none'?'block':'none';}

async function addColis(type){
  if(state.colisToday)return showToast('Colis déjà enregistré aujourd\'hui','#e87070');
  if(!state.client)return showToast('Identifiez d\'abord le client','#e87070');
  const hasProduct=Object.values(state.cart).some(v=>v>0);
  if(!hasProduct)return showToast('Le client doit acheter un produit','#e87070');
  const prodsInCart=state.products.filter(p=>(state.cart[p.id]||0)>0);
  const randProd=prodsInCart[Math.floor(Math.random()*prodsInCart.length)];
  const before=state.clientPoints[randProd.id]||0;
  const newVal=before+1;
  await upsertClientPoints(state.client.id,randProd.id,newVal);
  await sb.from('clients').update({last_colis:today()}).eq('id',state.client.id);
  state.clientPoints[randProd.id]=newVal;
  state.colisToday=true;
  const caissierNom=state.caissierActif?state.caissierActif.nom:null;
  const txLabel=`📦 Colis ${type} → +1 pt bonus ${randProd.icon}`;
  await sb.from('transactions').insert({client_id:state.client.id,label:txLabel,points:1,type:'earn',caissier_nom:caissierNom});
  state.lastColisData={produitId:randProd.id,valBefore:before,txLabel};
  showToast(`📦 Colis ${type} · +1 pt ${randProd.icon}`,'#7eb8d4');
  const cancelDiv=document.createElement('div');
  cancelDiv.id='cancel-colis';
  cancelDiv.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid rgba(232,112,112,.4);border-radius:14px;padding:12px 20px;display:flex;gap:12px;align-items:center;z-index:998;box-shadow:0 8px 30px rgba(0,0,0,.6)';
  cancelDiv.innerHTML=`<span style="font-size:13px;color:#7eb8d4">📦 Colis enregistré</span><button onclick="cancelColis()" style="background:rgba(232,112,112,.15);border:1px solid rgba(232,112,112,.4);color:#e87070;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer">↩️ Annuler</button>`;
  document.body.appendChild(cancelDiv);
  setTimeout(()=>{const d=document.getElementById('cancel-colis');if(d)d.remove();},10000);
  render();
}

async function cancelColis(){
  if(!state.lastColisData||!state.client)return;
  const {produitId,valBefore,txLabel}=state.lastColisData;
  await upsertClientPoints(state.client.id,produitId,valBefore);
  await sb.from('clients').update({last_colis:null}).eq('id',state.client.id);
  state.clientPoints[produitId]=valBefore;
  state.colisToday=false;state.lastColisData=null;
  const d=document.getElementById('cancel-colis');if(d)d.remove();
  await sb.from('transactions').delete().eq('client_id',state.client.id).eq('label',txLabel);
  showToast('↩️ Colis annulé','#e87070');render();
}

async function handlePay(){
  const items=state.products.filter(p=>(state.cart[p.id]||0)>0);
  if(!items.length)return;
  if(!state.client)return showToast('Identifiez le client avant d\'encaisser','#e87070');
  const caissierNom=state.caissierActif?state.caissierActif.nom:null;
  let globalPts=0;

  for(const p of items){
    const qty=state.cart[p.id]||0;
    const before=state.clientPoints[p.id]||0;
    const afterTotal=before+qty;
    const rewardsEarned=Math.floor(afterTotal/p.seuil)-Math.floor(before/p.seuil);
    const newPoints=afterTotal-(Math.floor(afterTotal/p.seuil)*p.seuil);
    await upsertClientPoints(state.client.id,p.id,newPoints);
    state.clientPoints[p.id]=newPoints;
    globalPts+=qty;
    if(rewardsEarned>0){
      await sb.from('transactions').insert({client_id:state.client.id,label:`🎁 ${rewardsEarned}× ${p.nom} offert`,points:-(rewardsEarned*p.seuil),type:'redeem',caissier_nom:caissierNom});
    }
  }

  // 1 seule ligne pour tout le passage
  const bonusItems=Object.values(state.cart).filter(v=>v&&v.isBonus);
const bonusPts=bonusItems.reduce((s,b)=>s+b.points,0);
if(bonusItems.length>0){
    const newPtsBonus=(state.client.points||0)+bonusPts;
    await sb.from('clients').update({points:newPtsBonus}).eq('id',state.client.id);
    for(const b of bonusItems){
      await sb.from('transactions').insert({client_id:state.client.id,label:`⭐ ${b.nom}`,points:b.points,type:'bonus',caissier_nom:caissierNom});
    }
    state.client.points=newPtsBonus;
    globalPts+=bonusPts;
  }
  const productItems=items.filter(p=>!p.isBonus);
  const label=productItems.map(p=>`${state.cart[p.id]}× ${p.nom}`).join(' · ');
  await sb.from('transactions').insert({client_id:state.client.id,label,points:globalPts,type:'earn',caissier_nom:caissierNom});
  const newTotal=(state.client.points||0)+globalPts;
  await sb.from('clients').update({points:newTotal}).eq('id',state.client.id);
  state.client.points=newTotal;

  state.cart={};state.step='done';
  showToast('✅ Encaissé !','#8fc98a');render();
  setTimeout(()=>{state.step='catalog';state.client=null;state.transactions=[];state.clientPoints={};state.colisToday=false;render();},2500);
}

async function searchClient(){
  const tel=document.getElementById('search-tel')?.value?.trim();
  if(!tel)return;
  const {data}=await sb.from('clients').select('*').eq('telephone',tel).single();
  if(data){await loadClient(data);render();}
  else showToast('Client non trouvé','#e87070');
}
async function createClient(){
  const nom=document.getElementById('new-nom')?.value?.trim();
  const tel=document.getElementById('new-tel')?.value?.trim();
  const pin=document.getElementById('new-pin')?.value?.trim();
  if(!nom||!tel)return showToast('Remplissez nom et téléphone','#e87070');
  if(!pin||pin.length!==4)return showToast('PIN doit faire 4 chiffres','#e87070');
  const {data,error}=await sb.from('clients').insert({nom,telephone:tel,points:0,pin}).select().single();
  if(error)return showToast('Numéro déjà utilisé','#e87070');
  await loadClient(data);showToast(`✅ ${nom} inscrit !`,'#8fc98a');render();
}
async function updatePIN(){
  const pin=document.getElementById('new-pin-client')?.value?.trim();
  if(!pin||pin.length!==4)return showToast('PIN doit faire 4 chiffres','#e87070');
  await sb.from('clients').update({pin}).eq('id',state.client.id);
  state.client.pin=pin;
  showToast('✅ PIN mis à jour !','#8fc98a');
  document.getElementById('change-pin-form').style.display='none';
}

  return`

      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
        <div>
          <div style="font-size:9px;letter-spacing:3px;color:${level.color};text-transform:uppercase;margin-bottom:3px">Carte Fidélité</div>

        </div>
        <span class="${getBadgeClass(c.points)}">${level.name}</span>

      <div style="font-size:48px;font-weight:800;color:${level.color};letter-spacing:-3px;line-height:1;text-align:center;margin-bottom:4px">${c.points.toLocaleString()}</div>

      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:linear-gradient(90deg,${level.color}66,${level.color})"></div></div>
      ${nextLevel?`<div style="font-size:11px;color:#444;text-align:right;margin-bottom:14px">${nextLevel.min-c.points} pts avant ${nextLevel.name}</div>`:'<div style="margin-bottom:14px"></div>'}
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:9px;color:#3a3a3a;letter-spacing:2px;text-transform:uppercase">Titulaire</div>
          <div style="font-size:14px;letter-spacing:1px;margin-top:2px;color:#ccc">${c.nom}</div>
        </div>
        <div style="font-family:monospace;font-size:10px;color:#2a2a2a">${c.telephone}</div>
      </div>
    </div>
    <div class="qr-section">
      <div class="section-title">Mon QR code</div>

async function loadPatronData(){
  const moisActuel=new Date().toISOString().slice(0,7);
 const [{data:c},{data:t},{data:cl},{data:sm},{data:rn},{data:bp}]=await Promise.all([
    sb.from('caissiers').select('*').order('created_at',{ascending:false}),
    sb.from('transactions').select('*').order('created_at',{ascending:false}).limit(100),
    sb.from('clients').select('*').order('created_at',{ascending:false}),
    sb.from('stats_mensuelles').select('*').order('mois',{ascending:false}).limit(12),
    sb.from('recompenses_niveaux').select('*').order('points_requis'),
    sb.from('bonus_points').select('*').eq('actif',true).order('ordre'),
  ]);
  state.caissiers=c||[];state.allTransactions=t||[];state.allClients=cl||[];
  state.statsMensuelles=sm||[];state.recompensesNiveaux=rn||[];state.bonusPoints=bp||[];
  // Archivage automatique le 1er du mois
  await archivageAuto(moisActuel);
  await loadProducts();
}

async function archivageAuto(moisActuel){
  // Vérifier si le mois précédent est déjà archivé
  const moisPrecedent=new Date(moisActuel+'-01');
  moisPrecedent.setMonth(moisPrecedent.getMonth()-1);
  const moisPrecedentStr=moisPrecedent.toISOString().slice(0,7);
  const dejaArchive=state.statsMensuelles.find(s=>s.mois===moisPrecedentStr);
  if(dejaArchive)return;

  // Calculer les stats du mois précédent
  const txMoisPrec=(state.allTransactions||[]).filter(t=>{
    return t.created_at&&t.created_at.slice(0,7)===moisPrecedentStr&&t.type==='earn';
  });
  if(!txMoisPrec.length)return;

  const ptsDist=txMoisPrec.reduce((s,t)=>s+(t.points||0),0);
  const statsCaissiers={};
  txMoisPrec.forEach(t=>{
    if(t.caissier_nom){
      if(!statsCaissiers[t.caissier_nom])statsCaissiers[t.caissier_nom]={tx:0,pts:0};
      statsCaissiers[t.caissier_nom].tx++;
      statsCaissiers[t.caissier_nom].pts+=t.points||0;
    }
  });
  const nouveauxClients=(state.allClients||[]).filter(c=>c.created_at&&c.created_at.slice(0,7)===moisPrecedentStr).length;

  await sb.from('stats_mensuelles').insert({
    mois:moisPrecedentStr,
    points_distribues:ptsDist,
    nb_transactions:txMoisPrec.length,
    nb_nouveaux_clients:nouveauxClients,
    stats_caissiers:statsCaissiers,
  });
}

async function selectPatronClient(clientId,clientObj){
  state.selectedClient=clientObj;
  const [{data:txs},{data:pts}]=await Promise.all([
    sb.from('transactions').select('*').eq('client_id',clientId).order('created_at',{ascending:false}).limit(30),
    sb.from('points_produits').select('*').eq('client_id',clientId),
  ]);
  state.selectedClientTx=txs||[];
  state.selectedClientPoints={};
  (pts||[]).forEach(r=>{state.selectedClientPoints[r.produit_id]=r.points;});
  render();
}

async function addProduit(){

  async function resetStatsConfirm(){
  if(!confirm('Remettre à zéro le compteur de ce mois ? Les points des clients ne seront pas affectés.'))return;
  const moisActuel=new Date().toISOString().slice(0,7);
  // Archiver d'abord le mois actuel
  const txMois=(state.allTransactions||[]).filter(t=>t.created_at&&t.created_at.slice(0,7)===moisActuel&&t.type==='earn');
  const ptsDist=txMois.reduce((s,t)=>s+(t.points||0),0);
  const statsCaissiers={};
  txMois.forEach(t=>{
    if(t.caissier_nom){
      if(!statsCaissiers[t.caissier_nom])statsCaissiers[t.caissier_nom]={tx:0,pts:0};
      statsCaissiers[t.caissier_nom].tx++;statsCaissiers[t.caissier_nom].pts+=t.points||0;
    }
  });
  const nvClients=(state.allClients||[]).filter(c=>c.created_at&&c.created_at.slice(0,7)===moisActuel).length;
  await sb.from('stats_mensuelles').upsert({mois:moisActuel,points_distribues:ptsDist,nb_transactions:txMois.length,nb_nouveaux_clients:nvClients,stats_caissiers:statsCaissiers},{onConflict:'mois'});
  showToast('✅ Stats archivées et compteur remis à zéro !','#8fc98a');
  await loadPatronData();render();
}

async function saveAjustPoints(clientId){
  const globalPts=parseInt(document.getElementById('ajust-global')?.value)||0;
  for(const p of state.products){
    const val=parseInt(document.getElementById(`ajust-${p.id}`)?.value)||0;
    const clamped=Math.min(val,p.seuil-1);
    await upsertClientPoints(clientId,p.id,clamped);
    state.selectedClientPoints[p.id]=clamped;
  }
  await sb.from('clients').update({points:globalPts}).eq('id',clientId);
  // Ne rien noter si les points globaux n'ont pas changé
const ancienPts=state.selectedClient.points||0;
const diff=globalPts-ancienPts;
if(diff!==0){
  await sb.from('transactions').insert({
    client_id:clientId,
    label:`✏️ Ajustement patron (${diff>0?'+':''}${diff} pts)`,
    points:diff,
    type:'bonus',
    caissier_nom:'Patron'
  });
}
  showToast('✅ Points ajustés !','#8fc98a');
  document.getElementById('ajust-points-form').style.display='none';
  await selectPatronClient(clientId,state.selectedClient);
}
async function deleteTx(txId){
  if(!confirm('Supprimer cette transaction ?'))return;

  // Recalculer les points produits depuis toutes les transactions restantes
  await sb.from('transactions').delete().eq('id',txId);

  // Recalcul points globaux
  const {data:txs}=await sb.from('transactions').select('points').eq('client_id',state.selectedClient.id);
  const newPts=Math.max(0,(txs||[]).reduce((s,t)=>s+(t.points||0),0));
  await sb.from('clients').update({points:newPts}).eq('id',state.selectedClient.id);

  // Recalcul points par produit depuis l'historique restant
  const {data:allTxs}=await sb.from('transactions').select('label,points,type').eq('client_id',state.selectedClient.id);
  const newProdPts={};
  state.products.forEach(p=>{newProdPts[p.id]=0;});
  (allTxs||[]).forEach(tx=>{
    if(tx.type==='earn'){
      state.products.forEach(p=>{
        // Compter les occurrences du produit dans le label
        const regex=new RegExp(`(\\d+)× ${p.nom}`);
        const match=tx.label.match(regex);
        if(match) newProdPts[p.id]=(newProdPts[p.id]||0)+parseInt(match[1]);
      });
    }
  });
  // Appliquer le modulo seuil pour chaque produit
  for(const p of state.products){
    const total=newProdPts[p.id]||0;
    const remaining=total%p.seuil;
    await upsertClientPoints(state.selectedClient.id,p.id,remaining);
  }
  
  showToast('🗑️ Transaction supprimée','#e87070');
  await selectPatronClient(state.selectedClient.id,state.selectedClient);
}

async function utiliserRecompenseNiveau(id,description,pointsRequis,niveau){
  if(!state.client)return;
  if(state.client.points<pointsRequis)return showToast('Pas assez de points','#e87070');
  if(!confirm(`Offrir "${description}" et déduire ${pointsRequis} pts ?`))return;
  const newPts=state.client.points-pointsRequis;
  await sb.from('clients').update({points:newPts}).eq('id',state.client.id);
  const caissierNom=state.caissierActif?state.caissierActif.nom:null;
  await sb.from('transactions').insert({
    client_id:state.client.id,
    label:`🎁 Récompense ${niveau} — ${description}`,
    points:-pointsRequis,
    type:'redeem',
    caissier_nom:caissierNom
  });
  state.client.points=newPts;
  showToast(`🎉 ${description} offert !`,'#7ec87e');
  render();
}
  function showToast(msg,color='#8fc98a'){
  state.toast={msg,color};render();
  setTimeout(()=>{state.toast=null;render();},3500);
}
